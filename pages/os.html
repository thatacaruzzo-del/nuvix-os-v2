<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvix — Ordens de Serviço</title>
<link rel="stylesheet" href="../css/nuvix.css">
<style>
/* ── OS Tabs ── */
.os-tabs{display:flex;gap:2px;background:#F1EFF7;border-radius:12px;padding:4px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.os-tabs::-webkit-scrollbar{display:none}
.os-tab{padding:0 16px;min-height:36px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);border:none;border-radius:9px;background:transparent;white-space:nowrap;transition:all .15s;flex-shrink:0}
.os-tab:hover{color:var(--p)}
.os-tab.active{color:var(--p);background:#fff;box-shadow:var(--shadow)}
.os-pane{display:none}.os-pane.active{display:block}

/* ── Status badges — cor semântica suave ── */
.st-aberta{background:#DBEAFE;color:#1D4ED8}
.st-agendada{background:var(--p-light);color:var(--p2)}
.st-deslocamento{background:#FEF3C7;color:#92400E}
.st-atendimento{background:var(--p-light);color:var(--p)}
.st-material{background:#FEF2F2;color:#DC2626}
.st-pausada{background:#F1EFF7;color:var(--muted)}
.st-concluida{background:#ECFDF5;color:#059669}
.st-cancelada{background:#F1EFF7;color:var(--muted)}

/* ── OS Card ── */
.os-card{background:linear-gradient(135deg,#fff 0%,#fff 45%,var(--p-light) 100%);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .2s;cursor:pointer}
.os-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.os-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.os-numero{font-size:13px;font-weight:800;color:var(--txt);letter-spacing:.04em}
.os-cliente{font-size:15px;font-weight:800;color:var(--txt);margin-top:2px}
.os-servico{font-size:12px;color:var(--muted);margin-top:2px}
.os-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.os-meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.os-meta-item b{color:var(--txt)}
.prioridade-alta{color:#D97706;font-weight:700}
.prioridade-urgente{color:#DC2626;font-weight:800;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── Modal OS ── */
.os-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;overflow-y:auto;padding:20px}
.os-modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.os-modal{background:#fff;border-radius:20px;width:100%;max-width:900px;margin:auto;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.3)}
.os-modal-header{background:linear-gradient(135deg,#241463,#6D5EF5);color:#fff;padding:24px 28px;display:flex;align-items:center;justify-content:space-between}
.os-modal-title{font-size:18px;font-weight:900}
.os-modal-body{padding:24px 28px;max-height:80vh;overflow-y:auto}
.os-modal-footer{padding:16px 28px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.os-section{margin-bottom:20px}
.os-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--p);margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--p-light);display:flex;align-items:center;gap:8px}

/* ── Timeline ── */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--line)}
.timeline-item{position:relative;margin-bottom:16px}
.timeline-item::before{content:'';position:absolute;left:-20px;top:4px;width:10px;height:10px;background:var(--p);border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px var(--p)}
.timeline-time{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:2px}
.timeline-event{font-size:13px;color:var(--txt);font-weight:600}
.timeline-user{font-size:11px;color:var(--muted)}

/* ── Checklist ── */
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.check-item:last-child{border-bottom:none}
.check-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--p);cursor:pointer}
.check-item label{font-size:13px;font-weight:600;cursor:pointer;flex:1}
.check-item.done label{text-decoration:line-through;color:var(--muted)}

/* ── Materiais tabela ── */
.mat-row{display:grid;grid-template-columns:2fr 80px 90px 90px 100px 36px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.mat-row input,.mat-row select{padding:6px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:12px;width:100%}
.mat-row-header{display:grid;grid-template-columns:2fr 80px 90px 90px 100px 36px;gap:8px;padding:6px 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:2px solid var(--line)}

/* ── KPI strip ── */
.os-kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.os-kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.os-kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.os-kpi-val{font-size:20px;font-weight:800;color:var(--txt)}
.os-kpi-sub{font-size:11px;color:var(--muted2);margin-top:2px}

/* ── Assinatura ── */
#sigCanvas{border:2px dashed var(--line);border-radius:12px;cursor:crosshair;width:100%;touch-action:none}

/* ── Filtros ── */
.os-filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.os-filtros select,.os-filtros input{padding:8px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;max-width:180px}

@media(max-width:900px){
  .os-kpis{grid-template-columns:repeat(3,1fr)}
  .mat-row,.mat-row-header{grid-template-columns:1fr 60px 80px 80px 80px 30px}
  #hambBtn{display:block!important}
}
@media(max-width:600px){
  .os-kpis{grid-template-columns:1fr 1fr}
  .os-modal-body{padding:16px}
}
</style>
</head>
<body>
<div id="pageLoader" class="page-loader"><div class="page-loader-spinner"></div></div>
<script>
function $(id){return document.getElementById(id)}
function val(id){const e=$(id);return e?e.value:''}
function num(id){const e=$(id);return e?Number(e.value||0):0}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function fmtData(d){if(!d)return'—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function fmtHora(h){return h?String(h).slice(0,5):'—'}
function hoje(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function agora(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function setHTML(id,h){const e=$(id);if(e)e.innerHTML=h}
function toast(t,type){document.querySelector('.nx-toast')?.remove();const el=document.createElement('div');el.className='nx-toast '+(type||'ok');el.textContent=t;document.body.appendChild(el);setTimeout(()=>{el.style.opacity='0'},3000);setTimeout(()=>el.remove(),3400)}
function confirmarAcao(mensagem,opts){opts=opts||{};return new Promise(resolve=>{const overlay=document.createElement('div');overlay.className='nx-confirm-overlay';const box=document.createElement('div');box.className='nx-confirm-box';const msgEl=document.createElement('div');msgEl.className='nx-confirm-msg';msgEl.textContent=mensagem;const actions=document.createElement('div');actions.className='nx-confirm-actions';const btnCancel=document.createElement('button');btnCancel.type='button';btnCancel.className='nx-confirm-cancel';btnCancel.textContent=opts.labelCancelar||'Cancelar';const btnOk=document.createElement('button');btnOk.type='button';btnOk.className='nx-confirm-ok '+(opts.variante||'perigo');btnOk.textContent=opts.labelOk||'Excluir';actions.append(btnCancel,btnOk);box.append(msgEl,actions);overlay.append(box);document.body.appendChild(overlay);function onKey(e){if(e.key==='Escape')finish(false)}function finish(r){document.removeEventListener('keydown',onKey);overlay.remove();resolve(r)}btnCancel.onclick=()=>finish(false);btnOk.onclick=()=>finish(true);overlay.onclick=e=>{if(e.target===overlay)finish(false)};document.addEventListener('keydown',onKey);btnOk.focus();})}
function promptAcao(mensagem,opts){opts=opts||{};return new Promise(resolve=>{const overlay=document.createElement('div');overlay.className='nx-confirm-overlay';const box=document.createElement('div');box.className='nx-confirm-box';const msgEl=document.createElement('div');msgEl.className='nx-confirm-msg';msgEl.textContent=mensagem;const input=document.createElement('input');input.type=opts.tipo||'text';input.className='nx-prompt-input';input.placeholder=opts.placeholder||'';if(opts.valor)input.value=opts.valor;const actions=document.createElement('div');actions.className='nx-confirm-actions';const btnCancel=document.createElement('button');btnCancel.type='button';btnCancel.className='nx-confirm-cancel';btnCancel.textContent='Cancelar';const btnOk=document.createElement('button');btnOk.type='button';btnOk.className='nx-confirm-ok neutro';btnOk.textContent=opts.labelOk||'OK';actions.append(btnCancel,btnOk);box.append(msgEl,input,actions);overlay.append(box);document.body.appendChild(overlay);function onKey(e){if(e.key==='Escape')finish(null);if(e.key==='Enter'){e.preventDefault();finish(input.value);}}function finish(r){document.removeEventListener('keydown',onKey);overlay.remove();resolve(r)}btnCancel.onclick=()=>finish(null);btnOk.onclick=()=>finish(input.value);overlay.onclick=e=>{if(e.target===overlay)finish(null)};document.addEventListener('keydown',onKey);input.focus();})}
function initials(n){if(!n)return'?';return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function money2(v){return Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}

const SB='https://quullcxptbiqycyakzlc.supabase.co';
const KEY='sb_publishable_hHub8WOjVFPavMPjmfGIBA_kDyvO1s6';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};
function _verificarSessao(){if(getSession())return true;setTimeout(()=>{window.location.href='../index.html';},1800);throw new Error('Sua sessão expirou. Redirecionando para o login...');}
function traduzErroGenerico(textoBruto){let m=String(textoBruto||'');try{const obj=JSON.parse(m);m=obj.message||obj.details||obj.hint||m;}catch(e){}if(/duplicate key|already exists/i.test(m))return'Já existe um registro com essa informação.';if(/violates not-null constraint/i.test(m))return'Preencha todos os campos obrigatórios antes de salvar.';if(/violates foreign key constraint/i.test(m))return'Não é possível concluir — esse registro está vinculado a outro cadastro.';return'Algo deu errado. Tente novamente — se continuar, entre em contato com o suporte.';}
const db={
  get:async(t,q)=>{_verificarSessao();let r;try{r=await fetch(`${SB}/rest/v1/${t}${q||''}`,{headers:H});}catch(e){throw new Error('Sem conexão com a internet. Verifique sua rede e tente de novo.');}if(!r.ok)throw new Error(traduzErroGenerico(await r.text()));return r.json()},
  post:async(t,d)=>{_verificarSessao();let r;try{r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:H,body:JSON.stringify(d)});}catch(e){throw new Error('Sem conexão com a internet. Verifique sua rede e tente de novo.');}if(!r.ok)throw new Error(traduzErroGenerico(await r.text()));return r.json()},
  patch:async(t,id,d)=>{_verificarSessao();let r;try{r=await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify(d)});}catch(e){throw new Error('Sem conexão com a internet. Verifique sua rede e tente de novo.');}if(!r.ok)throw new Error(traduzErroGenerico(await r.text()));return r.json()},
  delete:async(t,id)=>{_verificarSessao();let r;try{r=await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:H});}catch(e){throw new Error('Sem conexão com a internet. Verifique sua rede e tente de novo.');}if(!r.ok)throw new Error(traduzErroGenerico(await r.text()));return true},
};
const SESSION_KEY='nuvix_v2_session';
function getSession(){try{const raw=sessionStorage.getItem(SESSION_KEY);if(!raw)return null;const d=JSON.parse(raw);if(Date.now()-d.loginAt>8*60*60*1000){sessionStorage.removeItem(SESSION_KEY);return null}return{...d.user,empresa_id:d.empresa?.id,empresa:d.empresa}}catch{return null}}
function logout(){sessionStorage.removeItem(SESSION_KEY);window.location.href='../index.html'}
function requireAuth(){const s=getSession();if(!s){window.location.href='../index.html';return null}return s}
function withEmpresa(obj){const s=getSession();return{...obj,empresa_id:s?.empresa_id}}
</script>

  <div class="main-content" id="mainContent">
    <div class="topbar">
      <div class="topbar-left">
        <button style="background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--muted);display:none" id="hambBtn" onclick="abrirSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div>
          <div class="topbar-title">Ordens de Serviço</div>

      </div>
      <div class="topbar-right">

        <button class="os-tab" onclick="osTab('hoje',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Hoje</button>
        <button class="os-tab" onclick="osTab('abertas',this)"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#5B4CF0;margin-right:4px"></span> Abertas</button>

      <!-- NOVA OS -->
      <div id="pane-nova" class="os-pane">
        <div class="card">
          <h2 id="osTitulo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nova Ordem de Serviço</h2>
          <input type="hidden" id="osId">
          <input type="hidden" id="osNumero">

          <!-- DADOS GERAIS -->
          <div class="os-section">
            <div class="os-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Cliente</div>
            <div class="form-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
              <div class="field"><label>Cliente *</label>
                <select id="osCliente" onchange="preencherCliente(this)">

                </select>

              <div class="field"><label>Nome / Contato</label><input id="osContato" placeholder="Nome do contato"></div>
              <div class="field"><label>CPF / CNPJ</label><input id="osCpfCnpj" placeholder="000.000.000-00"></div>
              <div class="field"><label>Telefone</label><input id="osTelefone" placeholder="(11) 99999-9999"></div>
              <div class="field"><label>E-mail</label><input id="osEmail" type="email" placeholder="email@empresa.com"></div>
              <div class="field"><label>Cidade</label><input id="osCidade" placeholder="Cidade"></div>
              <div class="field" style="grid-column:1/-1"><label>Endereço</label><input id="osEndereco" placeholder="Rua, número, bairro..."></div>
            </div>
          </div>

          <!-- SERVIÇO -->
          <div class="os-section">
            <div class="os-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> Serviço</div>
            <div class="form-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
              <div class="field"><label>Serviço *</label><input id="osServico" placeholder="Tipo de serviço"></div>
              <div class="field"><label>Equipamento</label><input id="osEquipamento" placeholder="Ex: Notebook Dell, Ar-condicionado..."></div>
              <div class="field"><label>Categoria</label>
                <select id="osCategoria">
                  <option>Manutenção</option><option>Instalação</option><option>Reparo</option>
                  <option>Vistoria</option><option>Consultoria</option><option>Limpeza</option><option>Outros</option>
                </select>

              <div class="field"><label>Prioridade</label>
                <select id="osPrioridade">
                  <option>Normal</option><option>Baixa</option><option>Alta</option><option>Urgente</option>
                </select>
              </div>
              <div class="field"><label>Status</label>
                <select id="osStatus">
                  <option>Aberta</option><option>Agendada</option><option>Em deslocamento</option>
                  <option>Em atendimento</option><option>Aguardando material</option>
                  <option>Pausada</option><option>Concluída</option><option>Cancelada</option>
                </select>
              </div>
              <div class="field"><label>Técnico responsável</label>
                <select id="osTecnico">
                  <option value="">Selecionar...</option>
                </select>
              </div>
              <div class="field"><label>Equipe</label><input id="osEquipe" placeholder="Nome da equipe"></div>
              <div class="field"><label>Data de abertura</label><input id="osDataAbertura" type="date"></div>
              <div class="field"><label>Data agendada</label><input id="osDataAgendada" type="date"></div>
              <div class="field"><label>Hora início</label><input id="osHoraInicio" type="time"></div>
              <div class="field"><label>Hora fim</label><input id="osHoraFim" type="time"></div>
              <div class="field"><label>Garantia</label><input id="osGarantia" placeholder="Ex: 90 dias, 6 meses..."></div>
              <div class="field"><label>Valor do serviço (R$)</label><input id="osValorServico" type="number" step="0.01" placeholder="0,00" oninput="calcularTotalOS()"></div>
            </div>
          </div>

          <!-- DESCRIÇÃO -->
          <div class="os-section">
            <div class="os-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg> Descrição técnica</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div class="field"><label>Problema informado pelo cliente</label><textarea id="osProblema" rows="3" style="resize:vertical;width:100%" placeholder="Descreva o problema relatado..."></textarea></div>
              <div class="field"><label>Diagnóstico</label><textarea id="osDiagnostico" rows="3" style="resize:vertical;width:100%" placeholder="Diagnóstico técnico..."></textarea></div>
              <div class="field"><label>Solução executada</label><textarea id="osSolucao" rows="3" style="resize:vertical;width:100%" placeholder="Solução aplicada..."></textarea></div>
              <div class="field"><label>Observações técnicas</label><textarea id="osObsTecnica" rows="3" style="resize:vertical;width:100%" placeholder="Observações adicionais..."></textarea></div>
            </div>
            <div class="field" style="margin-top:12px"><label>Observações gerais</label><textarea id="osObs" rows="2" style="resize:vertical;width:100%" placeholder="Observações para o cliente..."></textarea></div>
          </div>

          <!-- MATERIAIS -->
          <div class="os-section">
            <div class="os-section-title" style="justify-content:space-between">
              <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Materiais utilizados</span>
              <button class="btn2" onclick="addMatOS()" style="font-size:12px;padding:6px 12px">+ Material</button>
            </div>
            <div class="mat-row-header"><span>Material</span><span>Qtd</span><span>Unid.</span><span>Custo unit.</span><span>Total</span><span></span></div>
            <div id="osMatLista"></div>
            <div id="osMatTotais" style="display:none;background:var(--p-light);border-radius:10px;padding:12px 16px;margin-top:10px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:13px;font-weight:700;color:var(--muted)">Total materiais:</span>
              <span style="font-size:18px;font-weight:800;color:var(--p)" id="osMatTotal">R$ 0,00</span>
            </div>
          </div>

          <!-- MÃO DE OBRA -->
          <div class="os-section">
            <div class="os-section-title" style="justify-content:space-between">
              <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Mão de obra</span>
              <button class="btn2" onclick="addMaoObraOS()" style="font-size:12px;padding:6px 12px">+ Técnico</button>
            </div>
            <div id="osMaoObraLista"></div>
            <div id="osMaoObraTotais" style="background:var(--p-light);border-radius:10px;padding:12px 16px;margin-top:10px;display:none;justify-content:space-between;align-items:center">
              <span style="font-size:13px;font-weight:700;color:var(--muted)">Total mão de obra:</span>
              <span style="font-size:18px;font-weight:800;color:var(--p)" id="osMaoObraTotal">R$ 0,00</span>
            </div>
          </div>

          <!-- CHECKLIST -->
          <div class="os-section">
            <div class="os-section-title" style="justify-content:space-between">
              <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Checklist</span>
              <button class="btn2" onclick="addCheckOS()" style="font-size:12px;padding:6px 12px">+ Item</button>
            </div>
            <div id="osCheckLista"></div>
          </div>

          <!-- TOTAL GERAL -->
          <div style="background:linear-gradient(135deg,#241463,#6D5EF5);border-radius:16px;padding:20px 24px;margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
            <div style="color:rgba(255,255,255,.7);font-size:13px;font-weight:700">VALOR TOTAL DA OS</div>
            <div style="font-size:32px;font-weight:900;color:#fff" id="osTotalGeral">R$ 0,00</div>
          </div>

          <div class="actions" style="margin-top:16px">
            <button class="btn" onclick="salvarOS()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Salvar OS</button>
            <button class="btn2" onclick="limparOS()">Limpar</button>
          </div>
          <div id="osMsg" class="msg"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL DETALHES OS -->
<div class="os-modal-overlay" id="modalOS">
  <div class="os-modal">
    <div class="os-modal-header">
      <div>
        <div style="font-size:12px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.08em" id="modalOsNumero">OS-000000</div>
        <div class="os-modal-title" id="modalOsCliente">—</div>
        <div style="font-size:13px;opacity:.7;margin-top:2px" id="modalOsServico">—</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="modalOsStatus" class="badge" style="font-size:13px;padding:6px 14px"></span>
        <button onclick="fecharModalOS()" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px">×</button>
      </div>
    </div>
    <div class="os-modal-body" id="osModalBody"></div>
    <div class="os-modal-footer">
      <button class="btn2" onclick="fecharModalOS()">Fechar</button>
      <button class="btn2" id="modalBtnEditar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg> Editar</button>
      <select id="modalMudarStatus" onchange="mudarStatusOS()" style="padding:8px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;font-weight:700">
        <option value="">Mudar status...</option>
        <option>Aberta</option><option>Agendada</option><option>Em deslocamento</option>
        <option>Em atendimento</option><option>Aguardando material</option>
        <option>Pausada</option><option>Concluída</option><option>Cancelada</option>
      </select>
      <button class="btn" id="modalBtnConcluir" style="background:var(--green)" onclick="concluirOS()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Concluir OS</button>
    </div>
  </div>
</div>

<script>
(function(){try{const raw=sessionStorage.getItem('nuvix_v2_session');if(raw){const d=JSON.parse(raw);const seg=d.empresa?.segmento||d.empresa?.tipo||'';if(seg==='Transporte'||seg==='Mista')document.querySelectorAll('.nx-menu-transporte').forEach(el=>el.style.display='flex');}}catch(e){}})();
function abrirSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open');document.body.style.overflow='hidden'}
function fecharSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');document.body.style.overflow=''}

const session = requireAuth();
let dados = {os:[],clientes:[],materiais:[],colaboradores:[]};
let osMatItens = [];
let osMaoObraItens = [];
let osCheckItens = [];
let osAtualId = null;

// ── INIT ──
async function init(){
  if(!session)return;
  $('userName').textContent=session.nome||'';
  $('userAvatar').textContent=initials(session.nome||'');
  const emp=session.empresa;
  if(emp){
    $('topbarSub').textContent=(emp.fantasia||emp.razao||'')+' · Ordens de Serviço';
    if(emp.trial_fim){const d=Math.ceil((new Date(emp.trial_fim)-new Date())/864e5);if(d>0){$('trialBadge').textContent='Trial: '+d+' dias';$('trialBadge').style.display='inline-block';}}
  }
  if($('osDataAbertura'))$('osDataAbertura').value=hoje();
  if($('dataHoje'))$('dataHoje').textContent=fmtData(hoje());
  await loadData();
  $('pageLoader')?.classList.add('hide');
}

// ── LOAD ──
async function loadData(){
  if(!session?.empresa_id)return;
  const q=`?empresa_id=eq.${session.empresa_id}`;
  try{
    const [os,cli,mats,cols] = await Promise.all([
      db.get('ordens_servico',q+'&order=created_at.desc&select=*'),
      db.get('clientes',q+'&order=nome.asc&select=*').catch(()=>[]),
      db.get('materiais',q+'&status=eq.Ativo&order=nome.asc&select=id,nome,unidade,custo_compra').catch(()=>[]),
      db.get('colaboradores',q+'&ativo=eq.true&order=nome.asc&select=id,nome,cargo').catch(()=>[]),
    ]);
    dados={os,clientes:cli,materiais:mats,colaboradores:cols};
    popularSelects();
    renderKpis();
    renderLista();
    renderHoje();
    renderAbertas();
    renderAndamento();
    renderConcluidas();
  }catch(e){toast('Erro ao carregar: '+e.message,'err');}
}

// ── SELECTS ──
function popularSelects(){
  // Clientes
  const cliOpts='<option value="">Selecionar cliente...</option>'+(dados.clientes||[]).filter(c=>c.nome).map(c=>`<option value="${c.id}" data-nome="${esc(c.nome||'')}" data-tel="${esc(c.telefone||c.whatsapp||'')}" data-email="${esc(c.email||'')}" data-cidade="${esc(c.cidade||c.cidade_uf||'')}" data-end="${esc(c.endereco||c.endereco_completo||'')}" data-cpf="${esc(c.cpf_cnpj||c.cnpj||c.cpf||'')}">${esc(c.nome)}</option>`).join('');
  if($('osCliente'))$('osCliente').innerHTML=cliOpts;
  console.log('Clientes carregados:', dados.clientes?.length);
  // Técnicos
  const tecOpts='<option value="">Selecionar...</option>'+dados.colaboradores.map(c=>`<option value="${c.id}">${esc(c.nome)} ${c.cargo?'('+esc(c.cargo)+')':''}</option>`).join('');
  if($('osTecnico'))$('osTecnico').innerHTML=tecOpts;
  // Materiais nos itens
  renderMatItens();
}

function preencherCliente(sel){
  const opt=sel.options[sel.selectedIndex];
  if(!opt.value)return;
  if($('osContato'))$('osContato').value=opt.dataset.nome||'';
  if($('osTelefone'))$('osTelefone').value=opt.dataset.tel||'';
  if($('osEmail'))$('osEmail').value=opt.dataset.email||'';
  if($('osCidade'))$('osCidade').value=opt.dataset.cidade||'';
  if($('osEndereco'))$('osEndereco').value=opt.dataset.end||'';
  if($('osCpfCnpj'))$('osCpfCnpj').value=opt.dataset.cpf||'';
}

// ── KPIs ──
function renderKpis(){
  const os=dados.os, hj=hoje();
  const abertas=os.filter(o=>o.status==='Aberta').length;
  const andamento=os.filter(o=>['Em atendimento','Em deslocamento','Agendada'].includes(o.status||'')).length;
  const concluidas=os.filter(o=>o.status==='Concluída').length;
  const canceladas=os.filter(o=>o.status==='Cancelada').length;
  const fatMes=os.filter(o=>o.status==='Concluída'&&String(o.data_conclusao||o.created_at||'').slice(0,7)===hj.slice(0,7)).reduce((a,o)=>a+Number(o.valor_total||0),0);
  const ticket=concluidas>0?os.filter(o=>o.status==='Concluída').reduce((a,o)=>a+Number(o.valor_total||0),0)/concluidas:0;
  const hoje_os=os.filter(o=>String(o.data_agendada||'').slice(0,10)===hj).length;
  const vencidas=os.filter(o=>!['Concluída','Cancelada'].includes(o.status||'')&&String(o.data_agendada||'').slice(0,10)<hj&&String(o.data_agendada||'').slice(0,10)).length;

  setHTML('osKpis',[
    {lbl:'Abertas',val:abertas,sub:'aguardando',cor:'var(--txt)'},
    {lbl:'Em andamento',val:andamento,sub:'em execução',cor:'var(--txt)'},
    {lbl:'Concluídas',val:concluidas,sub:'este mês',cor:'var(--txt)'},
    {lbl:'Faturamento',val:money(fatMes),sub:'OS concluídas · não é receita confirmada',cor:'var(--txt)'},
    {lbl:'Ticket médio',val:money(ticket),sub:'por OS',cor:'var(--txt)'},
    {lbl:'Para hoje',val:hoje_os+(vencidas>0?` <span style="color:var(--red);font-size:12px">(${vencidas} venc.)</span>`:''),sub:'agendadas',cor:'var(--txt)'},
  ].map(k=>`<div class="os-kpi"><div class="os-kpi-lbl">${k.lbl}</div><div class="os-kpi-val" style="color:${k.cor}">${k.val}</div><div class="os-kpi-sub">${k.sub}</div></div>`).join(''));
  // Frase de contexto no topo — reaproveita "vencidas", já calculado acima pro card "Para hoje".
  setHTML('osInsightLine',vencidas>0?`<div class="insight-line"><span class="insight-dot"></span><div class="insight-txt"><b>${vencidas} ordem${vencidas>1?'s':''} de serviço atrasada${vencidas>1?'s':''}.</b> Já passou da data agendada e ainda não foi concluída.</div></div>`:'');
}

// ── STATUS BADGE ──
function statusBadge(status){
  const map={'Aberta':'st-aberta','Agendada':'st-agendada','Em deslocamento':'st-deslocamento','Em atendimento':'st-atendimento','Aguardando material':'st-material','Pausada':'st-pausada','Concluída':'st-concluida','Cancelada':'st-cancelada'};
  return`<span class="badge ${map[status]||''}" style="font-size:11px">${status||'—'}</span>`;
}

function prioridadeBadge(p){
  if(p==='Urgente')return`<span class="prioridade-urgente"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#DC2626;margin-right:4px"></span> Urgente</span>`;
  if(p==='Alta')return`<span class="prioridade-alta"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#D97706;margin-right:4px"></span> Alta</span>`;
  if(p==='Baixa')return`<span style="color:var(--muted);font-size:12px"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;border:1.5px solid #9CA3AF;margin-right:4px"></span> Baixa</span>`;
  return`<span style="color:var(--muted);font-size:12px"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#9CA3AF;margin-right:4px"></span> Normal</span>`;
}

// ── RENDER OS CARD ──
function renderOsCard(o){
  const atrasada=!['Concluída','Cancelada'].includes(o.status||'')&&String(o.data_agendada||'').slice(0,10)<hoje()&&String(o.data_agendada||'').slice(0,10);
  return`<div class="os-card" style="${atrasada?'border-left:4px solid var(--red);':''}" onclick="verOS('${o.id}')">
    <div class="os-card-header">
      <div>
        <div class="os-numero">${esc(o.numero||'—')} ${atrasada?'<span style="color:var(--red);font-size:11px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Atrasada</span>':''}</div>
        <div class="os-cliente">${esc(o.cliente_nome||'—')}</div>
        <div class="os-servico">${esc(o.servico||'—')} ${o.equipamento?'· '+esc(o.equipamento):''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        ${statusBadge(o.status)}
        ${prioridadeBadge(o.prioridade)}
      </div>
    </div>
    <div class="os-meta">
      ${o.tecnico_nome?`<div class="os-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <b>${esc(o.tecnico_nome)}</b></div>`:''}
      ${o.data_agendada?`<div class="os-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> <b>${fmtData(o.data_agendada)}</b>${o.hora_inicio?' às '+fmtHora(o.hora_inicio):''}</div>`:''}
      ${o.valor_total?`<div class="os-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg> <b style="color:var(--txt)">${money(o.valor_total)}</b></div>`:''}

// ── RENDER LISTAS ──
function renderLista(){
  const busca=val('filtBusca').toLowerCase(), status=val('filtStatus'), prio=val('filtPrioridade'), mes=val('filtMes');
  let lista=dados.os;
  if(busca)lista=lista.filter(o=>(o.numero||'').toLowerCase().includes(busca)||(o.cliente_nome||'').toLowerCase().includes(busca)||(o.servico||'').toLowerCase().includes(busca)||(o.cpf_cnpj||'').includes(busca)||(o.telefone||'').includes(busca));
  if(status)lista=lista.filter(o=>o.status===status);
  if(prio)lista=lista.filter(o=>o.prioridade===prio);
  if(mes)lista=lista.filter(o=>String(o.created_at||'').slice(0,7)===mes);
  const vazio = dados.os.length===0 ? `Nenhuma OS cadastrada ainda. <a href="#" onclick="osTab('nova');return false" style="color:var(--p);font-weight:700">Criar a primeira →</a>` : 'Nenhuma OS encontrada.';
  setHTML('osLista',lista.length?lista.map(renderOsCard).join(''):`<div style="text-align:center;padding:40px;color:var(--muted)">${vazio}</div>`);
}
function renderHoje(){const hj=hoje();const lista=dados.os.filter(o=>String(o.data_agendada||'').slice(0,10)===hj);setHTML('osHoje',lista.length?lista.map(renderOsCard).join(''):'<div style="text-align:center;padding:40px;color:var(--muted)">Nenhuma OS agendada para hoje.</div>');}
function renderAbertas(){const lista=dados.os.filter(o=>o.status==='Aberta');const vazio=dados.os.length===0?`Nenhuma OS cadastrada ainda. <a href="#" onclick="osTab('nova');return false" style="color:var(--p);font-weight:700">Criar a primeira →</a>`:'Nenhuma OS aberta.';setHTML('osAbertas',lista.length?lista.map(renderOsCard).join(''):`<div style="text-align:center;padding:40px;color:var(--muted)">${vazio}</div>`);}
function renderAndamento(){const lista=dados.os.filter(o=>['Em atendimento','Em deslocamento','Agendada','Aguardando material','Pausada'].includes(o.status||''));setHTML('osAndamento',lista.length?lista.map(renderOsCard).join(''):'<div style="text-align:center;padding:40px;color:var(--muted)">Nenhuma OS em andamento.</div>');}
function renderConcluidas(){const lista=dados.os.filter(o=>o.status==='Concluída');setHTML('osConcluidas',lista.length?lista.map(renderOsCard).join(''):'<div style="text-align:center;padding:40px;color:var(--muted)">Nenhuma OS concluída.</div>');}

// ── VER OS (MODAL) ──

  $('modalOsStatus').className='badge '+(({'Aberta':'ok','Concluída':'ok','Cancelada':'bad','Em atendimento':'ok'})[o.status]||'');

function fecharModalOS(){$('modalOS').classList.remove('open');osAtualId=null;}

// ── REABRIR OS ──
async function reabrirOS(){
  if(!osAtualId)return;
  const o=dados.os.find(x=>x.id===osAtualId);
  if(!await confirmarAcao(`Reabrir a ${o?.numero}?\n\nO status voltará para "Aberta".\nObs: o estoque NÃO será revertido automaticamente.`,{variante:'neutro',labelOk:'Reabrir'}))return;
  try{
    await db.patch('ordens_servico',osAtualId,{
      status:'Aberta',
      data_conclusao:null,
      updated_at:new Date().toISOString()
    });
    await db.post('os_timeline',withEmpresa({
      os_id:osAtualId,
      evento:`↩ OS reaberta pelo administrador (estava: ${o?.status})`,
      usuario_nome:session?.nome||''
    }));
    toast('↩ OS reaberta com sucesso!');
    fecharModalOS();
    await loadData();
  }catch(e){toast('Erro: '+e.message,'err');}
}

// ── EXCLUIR OS (do modal) ──
async function excluirOSModal(){
  if(!osAtualId)return;
  const o=dados.os.find(x=>x.id===osAtualId);
  if(!await confirmarAcao(`ATENÇÃO!\n\nExcluir permanentemente a ${o?.numero}?\n\nIsso NÃO pode ser desfeito.\nTodos os dados desta OS serão perdidos.`,{labelOk:'Continuar'}))return;
  if(!await confirmarAcao(`Confirmar exclusão de ${o?.numero} — ${o?.cliente_nome}?`,{labelOk:'Excluir'}))return;
  try{
    // Delete related records first
    await db.get('os_materiais',`?os_id=eq.${osAtualId}&select=id`).then(async r=>{for(const i of r)await db.delete('os_materiais',i.id).catch(()=>{});}).catch(()=>{});
    await db.get('os_mao_obra',`?os_id=eq.${osAtualId}&select=id`).then(async r=>{for(const i of r)await db.delete('os_mao_obra',i.id).catch(()=>{});}).catch(()=>{});
    await db.get('os_checklist',`?os_id=eq.${osAtualId}&select=id`).then(async r=>{for(const i of r)await db.delete('os_checklist',i.id).catch(()=>{});}).catch(()=>{});
    await db.get('os_timeline',`?os_id=eq.${osAtualId}&select=id`).then(async r=>{for(const i of r)await db.delete('os_timeline',i.id).catch(()=>{});}).catch(()=>{});
    await db.delete('ordens_servico',osAtualId);
    toast('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> OS excluída permanentemente.');
    fecharModalOS();
    await loadData();
  }catch(e){toast('Erro ao excluir: '+e.message,'err');}
}
$('modalOS').addEventListener('click',function(e){if(e.target===this)fecharModalOS();});

// ── TOGGLE CHECKLIST ──
async function toggleCheck(id,val){
  try{
    await db.patch('os_checklist',id,{concluido:val});
    if(osAtualId)await verOS(osAtualId);
  }catch(e){toast('Erro: '+e.message,'err');}
}

// ── MUDAR STATUS ──
async function mudarStatusOS(){
  const novoStatus=val('modalMudarStatus');
  if(!novoStatus||!osAtualId)return;
  try{
    const o=dados.os.find(x=>x.id===osAtualId);
    const statusAnterior=o?.status;
    const viraConcluida=novoStatus==='Concluída'&&statusAnterior!=='Concluída';
    await db.patch('ordens_servico',osAtualId,{status:novoStatus,updated_at:new Date().toISOString(),...(viraConcluida?{data_conclusao:hoje()}:{})});
    await db.post('os_timeline',withEmpresa({os_id:osAtualId,evento:`Status alterado para: ${novoStatus}`,usuario_nome:session?.nome||''}));
    // Mesma integração do botão "Concluir OS" — garante que baixa de estoque e receita
    // no financeiro aconteçam também quando a conclusão vem pelo dropdown de status.
    if(viraConcluida){
      await processarConclusaoOS(osAtualId,o);
      await db.post('os_timeline',withEmpresa({os_id:osAtualId,evento:'Estoque atualizado e receita lançada no financeiro',usuario_nome:session?.nome||''}));
    }
    toast('Status atualizado!');
    $('modalMudarStatus').value='';
    fecharModalOS();
    await loadData();
  }catch(e){toast('Erro: '+e.message,'err');}
}

// ── INTEGRAÇÃO DE CONCLUSÃO (compartilhada entre "Concluir OS" e o dropdown de status) ──
// Baixa materiais do estoque e lança a receita correspondente no financeiro.
// Chamada sempre que uma OS transiciona PARA o status "Concluída", não importa por qual caminho.
async function processarConclusaoOS(osId,o){
  // Trava contra duplicação: se reabrirem a OS e concluírem de novo (ou qualquer outro
  // caminho repetir a chamada), não baixa estoque nem lança receita uma segunda vez.
  try{
    const jaFaturado=await db.get('financeiro',`?categoria=eq.Serviços&descricao=like.*OS ${encodeURIComponent(o?.numero||'')}*&limit=1`).catch(()=>[]);
    if(jaFaturado.length){toast('Esta OS já foi concluída e faturada anteriormente — nada foi duplicado.','err');return;}
  }catch(e){/* se a checagem falhar, segue o fluxo normal abaixo */}

  // Baixar materiais do estoque
  const mats=await db.get('os_materiais',`?os_id=eq.${osId}`).catch(()=>[]);
  for(const m of mats){
    if(!m.material_id)continue;
    try{
      const matAtual=await db.get('materiais',`?id=eq.${m.material_id}&select=estoque_atual`);
      if(matAtual.length){
        const novoEstoque=Math.max(0,Number(matAtual[0].estoque_atual||0)-Number(m.quantidade||0));
        await db.patch('materiais',m.material_id,{estoque_atual:novoEstoque,updated_at:new Date().toISOString()});
        await db.post('material_movimentacoes',withEmpresa({
          material_id:m.material_id,material_nome:m.material_nome,
          tipo:'saida',quantidade:m.quantidade,
          estoque_anterior:Number(matAtual[0].estoque_atual||0),
          estoque_posterior:novoEstoque,
          custo_unitario:m.custo_unitario,
          valor_total:m.valor_total,
          motivo:'Ordem de Serviço concluída',
          os_numero:o?.numero||osId.slice(0,8),
          usuario_nome:session?.nome||null
        }));
      }
    }catch(e){console.warn('Erro ao baixar material:',e.message);}
  }

  // Lançar receita no financeiro
  await db.post('financeiro',withEmpresa({
    tipo:'Receita',
    categoria:'Serviços',
    descricao:`OS ${o?.numero||''} — ${o?.cliente_nome||''} — ${o?.servico||''}`,
    valor:Number(o?.valor_total||0),
    data_lancamento:hoje(),
    vencimento:hoje(),
    status:'Pendente',
    forma_pagamento:'A combinar',
    centro_custo:'Serviços',
    favorecido:o?.cliente_nome||null,
    observacao:`Ordem de Serviço ${o?.numero} concluída`,
  }));
}

// ── CONCLUIR OS (com integração) ──
async function concluirOS(){
  if(!osAtualId)return;
  const o=dados.os.find(x=>x.id===osAtualId);
  if(!await confirmarAcao(`Concluir a OS ${o?.numero}?\n\nIsso irá:\n• Baixar materiais do estoque\n• Lançar receita no financeiro\n• Registrar na timeline`,{variante:'neutro',labelOk:'Concluir'}))return;
  try{
    await db.patch('ordens_servico',osAtualId,{status:'Concluída',data_conclusao:hoje(),updated_at:new Date().toISOString()});
    await processarConclusaoOS(osAtualId,o);
    await db.post('os_timeline',withEmpresa({os_id:osAtualId,evento:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> OS Concluída — Estoque atualizado e receita lançada no financeiro',usuario_nome:session?.nome||''}));

    toast('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> OS concluída! Estoque baixado e receita lançada no financeiro.');
    fecharModalOS();
    await loadData();
  }catch(e){toast('Erro ao concluir: '+e.message,'err');}
}

// ── MATERIAIS DA OS (formulário) ──
function addMatOS(){
  osMatItens.push({material_id:'',material_nome:'',quantidade:1,unidade:'UN',custo_unitario:0,valor_total:0});
  renderMatItens();
}
function remMatOS(i){osMatItens.splice(i,1);renderMatItens();}
function renderMatItens(){
  const el=$('osMatLista');if(!el)return;
  if(!osMatItens.length){el.innerHTML='<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">Nenhum material. Clique em "+ Material"</div>';if($('osMatTotais'))$('osMatTotais').style.display='none';return;}
  el.innerHTML=osMatItens.map((m,i)=>`
    <div class="mat-row">
      <select onchange="selMatOS(${i},this)" style="font-size:12px">
        <option value="">Selecionar...</option>
        ${dados.materiais.map(mat=>`<option value="${mat.id}" data-custo="${mat.custo_compra||0}" data-un="${mat.unidade||'UN'}" ${m.material_id===mat.id?'selected':''}>${esc(mat.nome)}</option>`).join('')}
      </select>
      <input type="number" value="${m.quantidade}" min="0.001" step="0.001" onchange="updMatOS(${i},'quantidade',this.value)" style="text-align:center">
      <input type="text" value="${m.unidade}" onchange="updMatOS(${i},'unidade',this.value)">
      <input type="number" value="${m.custo_unitario}" step="0.01" onchange="updMatOS(${i},'custo_unitario',this.value)">
      <div style="font-size:13px;font-weight:700;color:var(--txt);padding:6px">${money(m.valor_total)}</div>
      <button onclick="remMatOS(${i})" style="background:var(--red-bg);color:var(--red);border:none;border-radius:8px;width:30px;height:30px;cursor:pointer">×</button>
    </div>`).join('');
  calcularTotalOS();
  if($('osMatTotais'))$('osMatTotais').style.display='flex';
}
function selMatOS(i,sel){
  if(!sel.value)return;
  const opt=sel.options[sel.selectedIndex];
  osMatItens[i]={...osMatItens[i],material_id:sel.value,material_nome:opt.text,unidade:opt.dataset.un||'UN',custo_unitario:Number(opt.dataset.custo||0)};
  osMatItens[i].valor_total=osMatItens[i].quantidade*osMatItens[i].custo_unitario;
  renderMatItens();
}
function updMatOS(i,campo,v){
  osMatItens[i][campo]=campo==='unidade'?v:Number(v)||0;
  osMatItens[i].valor_total=osMatItens[i].quantidade*osMatItens[i].custo_unitario;
  calcularTotalOS();
}

// ── MÃO DE OBRA (formulário) ──
function addMaoObraOS(){
  osMaoObraItens.push({tecnico:'',horas:0,valor_hora:0,total:0});
  renderMaoObraItens();
}
function remMaoObraOS(i){osMaoObraItens.splice(i,1);renderMaoObraItens();}
function renderMaoObraItens(){
  const el=$('osMaoObraLista');if(!el)return;
  if(!osMaoObraItens.length){el.innerHTML='<div style="text-align:center;padding:12px;color:var(--muted);font-size:13px">Nenhum técnico. Clique em "+ Técnico"</div>';if($('osMaoObraTotais'))$('osMaoObraTotais').style.display='none';return;}
  el.innerHTML=osMaoObraItens.map((m,i)=>`
    <div style="display:grid;grid-template-columns:2fr 80px 100px 100px 36px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)">
      <input type="text" value="${esc(m.tecnico)}" placeholder="Nome do técnico" onchange="updMOOS(${i},'tecnico',this.value)" style="padding:7px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:12px">
      <input type="number" value="${m.horas}" step="0.5" placeholder="Horas" onchange="updMOOS(${i},'horas',this.value)" style="padding:7px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:12px;text-align:center">
      <input type="number" value="${m.valor_hora}" step="0.01" placeholder="R$/hora" onchange="updMOOS(${i},'valor_hora',this.value)" style="padding:7px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:12px">
      <div style="font-size:13px;font-weight:700;color:var(--p);padding:6px">${money(m.total)}</div>
      <button onclick="remMaoObraOS(${i})" style="background:var(--red-bg);color:var(--red);border:none;border-radius:8px;width:30px;height:30px;cursor:pointer">×</button>
    </div>`).join('');
  calcularTotalOS();
  if($('osMaoObraTotais'))$('osMaoObraTotais').style.display='flex';
}
function updMOOS(i,campo,v){
  osMaoObraItens[i][campo]=campo==='tecnico'?v:Number(v)||0;
  osMaoObraItens[i].total=osMaoObraItens[i].horas*osMaoObraItens[i].valor_hora;
  calcularTotalOS();
}

// ── CHECKLIST (formulário) ──
async function addCheckOS(){
  const item=await promptAcao('Item do checklist:',{placeholder:'Ex: Verificar conexões',labelOk:'Adicionar'});
  if(!item)return;
  osCheckItens.push({item,concluido:false,ordem:osCheckItens.length});
  renderCheckItens();
}
function renderCheckItens(){
  const el=$('osCheckLista');if(!el)return;
  if(!osCheckItens.length){el.innerHTML='<div style="text-align:center;padding:12px;color:var(--muted);font-size:13px">Nenhum item. Clique em "+ Item"</div>';return;}
  el.innerHTML=osCheckItens.map((c,i)=>`
    <div class="check-item ${c.concluido?'done':''}">
      <input type="checkbox" ${c.concluido?'checked':''} onchange="osCheckItens[${i}].concluido=this.checked">
      <label>${esc(c.item)}</label>
      <button onclick="osCheckItens.splice(${i},1);renderCheckItens()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px">×</button>
    </div>`).join('');
}

// ── CALCULAR TOTAL ──
function calcularTotalOS(){
  const totalMat=osMatItens.reduce((a,m)=>a+Number(m.valor_total||0),0);
  const totalMO=osMaoObraItens.reduce((a,m)=>a+Number(m.total||0),0);
  const valorServico=num('osValorServico');
  const total=valorServico+totalMat+totalMO;
  if($('osMatTotal'))$('osMatTotal').textContent=money(totalMat);
  if($('osMaoObraTotal'))$('osMaoObraTotal').textContent=money(totalMO);
  if($('osTotalGeral'))$('osTotalGeral').textContent=money(total);
}

// ── SALVAR OS ──
async function salvarOS(){
  const cliente=val('osCliente'), servico=val('osServico').trim();
  if(!cliente&&!val('osContato').trim()){toast('Informe o cliente.','err');return;}
  if(!servico){toast('Informe o serviço.','err');return;}
  const id=val('osId');
  const totalMat=osMatItens.reduce((a,m)=>a+Number(m.valor_total||0),0);
  const totalMO=osMaoObraItens.reduce((a,m)=>a+Number(m.total||0),0);
  const valorServico=num('osValorServico');
  const total=valorServico+totalMat+totalMO;
  const tecOpt=$('osTecnico').options[$('osTecnico').selectedIndex];
  const cliOpt=$('osCliente').options[$('osCliente').selectedIndex];

  const payload=withEmpresa({
    cliente_id:cliente||null,
    cliente_nome:cliOpt?.value?cliOpt.text:val('osContato').trim(),
    contato:val('osContato').trim(),
    cpf_cnpj:val('osCpfCnpj').trim()||null,
    telefone:val('osTelefone').trim()||null,
    email:val('osEmail').trim()||null,
    endereco:val('osEndereco').trim()||null,
    cidade:val('osCidade').trim()||null,
    servico,
    equipamento:val('osEquipamento').trim()||null,
    categoria:val('osCategoria'),
    prioridade:val('osPrioridade'),
    status:val('osStatus'),
    tecnico_id:$('osTecnico').value||null,
    tecnico_nome:$('osTecnico').value?tecOpt?.text?.split('(')[0].trim():null,
    equipe:val('osEquipe').trim()||null,
    data_abertura:val('osDataAbertura')||hoje(),
    data_agendada:val('osDataAgendada')||null,
    hora_inicio:val('osHoraInicio')||null,
    hora_fim:val('osHoraFim')||null,
    garantia:val('osGarantia').trim()||null,
    problema_cliente:val('osProblema').trim()||null,
    diagnostico:val('osDiagnostico').trim()||null,
    solucao:val('osSolucao').trim()||null,
    obs_tecnica:val('osObsTecnica').trim()||null,
    observacoes:val('osObs').trim()||null,
    valor_servico:valorServico,
    valor_materiais:totalMat,
    valor_mao_obra:totalMO,
    valor_total:total,
    numero:id?val('osNumero'):null,
    updated_at:new Date().toISOString(),
  });

  try{
    let osId=id;
    if(id){
      await db.patch('ordens_servico',id,payload);
    } else {
      const res=await db.post('ordens_servico',payload);
      osId=Array.isArray(res)?res[0]?.id:res?.id;
    }

    // Salvar materiais
    if(osId&&osMatItens.length){
      const existing=await db.get('os_materiais',`?os_id=eq.${osId}`).catch(()=>[]);
      for(const e of existing)await db.delete('os_materiais',e.id).catch(()=>{});
      for(const m of osMatItens){
        if(!m.material_nome)continue;
        await db.post('os_materiais',withEmpresa({os_id:osId,material_id:m.material_id||null,material_nome:m.material_nome,quantidade:m.quantidade,unidade:m.unidade,custo_unitario:m.custo_unitario,valor_total:m.valor_total}));
      }
    }

    // Salvar mão de obra
    if(osId&&osMaoObraItens.length){
      const existing=await db.get('os_mao_obra',`?os_id=eq.${osId}`).catch(()=>[]);
      for(const e of existing)await db.delete('os_mao_obra',e.id).catch(()=>{});
      for(const m of osMaoObraItens){
        if(!m.tecnico)continue;
        await db.post('os_mao_obra',withEmpresa({os_id:osId,tecnico:m.tecnico,horas:m.horas,valor_hora:m.valor_hora,total:m.total}));
      }
    }

    // Salvar checklist
    if(osId&&osCheckItens.length){
      const existing=await db.get('os_checklist',`?os_id=eq.${osId}`).catch(()=>[]);
      for(const e of existing)await db.delete('os_checklist',e.id).catch(()=>{});
      for(const c of osCheckItens){
        await db.post('os_checklist',withEmpresa({os_id:osId,item:c.item,concluido:c.concluido,ordem:c.ordem}));
      }
    }

    // Timeline
    if(osId){
      await db.post('os_timeline',withEmpresa({os_id:osId,evento:id?'OS editada':'OS criada',usuario_nome:session?.nome||''}));
    }

    toast(id?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> OS atualizada!':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> OS criada com sucesso!');
    limparOS();
    await loadData();
    osTab('lista',document.querySelector('.os-tab'));
  }catch(e){toast('Erro: '+e.message,'err');}
}

// ── EDITAR OS ──
function editarOS(id){
  const o=dados.os.find(x=>x.id===id);if(!o)return;
  fecharModalOS();
  $('osId').value=o.id;
  $('osNumero').value=o.numero||'';
  if($('osCliente'))$('osCliente').value=o.cliente_id||'';
  ['osContato','osTelefone','osEmail','osCidade','osEndereco','osCpfCnpj',
   'osServico','osEquipamento','osEquipe','osGarantia','osProblema',
   'osDiagnostico','osSolucao','osObsTecnica','osObs'].forEach(fid=>{
    const campo=fid.replace('os','').replace(/^./,c=>c.toLowerCase());
    const fieldMap={osContato:'contato',osTelefone:'telefone',osEmail:'email',osCidade:'cidade',osEndereco:'endereco',osCpfCnpj:'cpf_cnpj',osServico:'servico',osEquipamento:'equipamento',osEquipe:'equipe',osGarantia:'garantia',osProblema:'problema_cliente',osDiagnostico:'diagnostico',osSolucao:'solucao',osObsTecnica:'obs_tecnica',osObs:'observacoes'};
    if($(fid))$(fid).value=o[fieldMap[fid]]||'';
  });
  if($('osCategoria'))$('osCategoria').value=o.categoria||'Manutenção';
  if($('osPrioridade'))$('osPrioridade').value=o.prioridade||'Normal';
  if($('osStatus'))$('osStatus').value=o.status||'Aberta';
  if($('osTecnico'))$('osTecnico').value=o.tecnico_id||'';
  if($('osDataAbertura'))$('osDataAbertura').value=o.data_abertura?String(o.data_abertura).slice(0,10):'';
  if($('osDataAgendada'))$('osDataAgendada').value=o.data_agendada?String(o.data_agendada).slice(0,10):'';
  if($('osHoraInicio'))$('osHoraInicio').value=fmtHora(o.hora_inicio);
  if($('osHoraFim'))$('osHoraFim').value=fmtHora(o.hora_fim);
  if($('osValorServico'))$('osValorServico').value=o.valor_servico||0;
  $('osTitulo').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg> Editar OS — '+(o.numero||'');
  osMatItens=[];osMaoObraItens=[];osCheckItens=[];
  // Load items async
  Promise.all([
    db.get('os_materiais',`?os_id=eq.${id}&order=created_at.asc`).then(mats=>{osMatItens=mats.map(m=>({...m}));renderMatItens();}),
    db.get('os_mao_obra',`?os_id=eq.${id}&order=created_at.asc`).then(mo=>{osMaoObraItens=mo.map(m=>({...m}));renderMaoObraItens();}),
    db.get('os_checklist',`?os_id=eq.${id}&order=ordem.asc`).then(ch=>{osCheckItens=ch.map(c=>({...c}));renderCheckItens();}),
  ]).catch(e=>console.warn(e));
  osTab('nova',document.querySelector('.os-tab:last-child'));
  document.querySelector('.main-scroll').scrollTop=0;
}

// ── LIMPAR OS ──
function limparOS(){
  ['osId','osNumero','osContato','osTelefone','osEmail','osCidade','osEndereco','osCpfCnpj',
   'osServico','osEquipamento','osEquipe','osGarantia','osProblema','osDiagnostico',
   'osSolucao','osObsTecnica','osObs','osValorServico'].forEach(id=>{if($(id))$(id).value='';});
  if($('osCliente'))$('osCliente').value='';
  if($('osCategoria'))$('osCategoria').value='Manutenção';
  if($('osPrioridade'))$('osPrioridade').value='Normal';
  if($('osStatus'))$('osStatus').value='Aberta';
  if($('osTecnico'))$('osTecnico').value='';
  if($('osDataAbertura'))$('osDataAbertura').value=hoje();
  if($('osDataAgendada'))$('osDataAgendada').value='';
  if($('osHoraInicio'))$('osHoraInicio').value='';
  if($('osHoraFim'))$('osHoraFim').value='';
  osMatItens=[];osMaoObraItens=[];osCheckItens=[];
  renderMatItens();renderMaoObraItens();renderCheckItens();
  if($('osTitulo'))$('osTitulo').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nova Ordem de Serviço';
  if($('osTotalGeral'))$('osTotalGeral').textContent='R$ 0,00';
}

// ── TABS ──
function osTab(id,btn){
  document.querySelectorAll('.os-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.os-tab').forEach(b=>b.classList.remove('active'));
  const pane=$('pane-'+id);if(pane)pane.classList.add('active');
  if(btn)btn.classList.add('active');
  document.querySelector('.main-scroll').scrollTop=0;
}

init();

        <a class="sb-btn" href="os.html" data-tip="Ordens de Serviço"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg><span>Ordens de Serviço</span></a>
        <a class="sb-btn" href="servicos.html" data-tip="Serviços e Orçamentos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>Serviços</span></a>
        <a class="sb-btn" href="materiais.html" data-tip="Materiais e Estoque"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg><span>Materiais</span></a>
      </div>`;
    }

    // TRANSPORTE
    if(isTransporte || isMista){
      html += `<div class="sb-group">
        <div class="sb-group-label">Transporte</div>
        <a class="sb-btn" href="transporte.html" data-tip="Operações"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><span>Transporte</span></a>
        <a class="sb-btn" href="cotacao.html" data-tip="Cotação de Frete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Cotação</span></a>
      </div>`;
    }

    // PESSOAS - always
    html += `<div class="sb-group">
      <div class="sb-group-label">Pessoas</div>
      <a class="sb-btn" href="app.html" data-tip="Clientes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Clientes</span></a>
      <a class="sb-btn" href="rh.html" data-tip="RH e Colaboradores"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg><span>RH</span></a>
    </div>`;

    // ANÁLISE - always
    html += `<div class="sb-group">
      <div class="sb-group-label">Análise</div>
      <a class="sb-btn" href="relatorios.html" data-tip="Relatórios"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Relatórios</span></a>
    </div>`;

    // Insert after logo
    logo.insertAdjacentHTML('afterend', html);

    // Mark active page
    const current = window.location.pathname.split('/').pop();
    nav.querySelectorAll('.sb-btn').forEach(btn => {
      if(btn.getAttribute('href') === current){
        btn.classList.add('active');
      }
    });

  }catch(e){ console.warn('Sidebar error:', e); }
})();
</script>
