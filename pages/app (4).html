<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvix</title>
<link rel="stylesheet" href="../css/nuvix.css">
<style>
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.sidebar-overlay.open{display:block}
.hamburger{display:none;background:transparent;border:none;color:var(--txt);font-size:24px;cursor:pointer;padding:4px 8px;line-height:1}
@media(max-width:768px){
  .hamburger{display:flex;align-items:center}
  .sidebar{transform:translateX(-100%);z-index:100}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0!important}
  .topbar{padding:10px 16px}
  .page-content{padding:16px}
  .form-row{grid-template-columns:1fr!important}
}
.page-content{padding:24px}
.nx-page{display:none}
.nx-page.active{display:block}
</style>
</head>
<body>

<script>
function $(id){return document.getElementById(id)}
function val(id){const e=$(id);return e?e.value:''}
function num(id){const e=$(id);return e?Number(e.value||0):0}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function fmtData(d){if(!d)return'—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function hoje(){return new Date().toISOString().slice(0,10)}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function setHTML(id,html){const e=$(id);if(e)e.innerHTML=html}
function msg(id,text,type='ok'){const e=$(id);if(!e){toast(text,type);return}e.textContent=text;e.className=`msg show ${type}`;setTimeout(()=>e.classList.remove('show'),5000)}
function toast(text,type='ok'){document.querySelector('.nx-toast')?.remove();const t=document.createElement('div');t.className=`nx-toast ${type}`;t.style.cssText='position:fixed;bottom:28px;right:28px;z-index:9999;padding:14px 22px;border-radius:16px;font-weight:700;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);transition:opacity .4s';t.style.background=type==='ok'?'#dcfce7':'#fee2e2';t.style.color=type==='ok'?'#166534':'#991b1b';t.textContent=text;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0'},3000);setTimeout(()=>t.remove(),3400)}
function exportCSV(data,filename){if(!data?.length){toast('Nada para exportar.','err');return}const cols=Object.keys(data[0]);const csv=[cols.join(','),...data.map(r=>cols.map(c=>`"${String(r[c]??'').replace(/"/g,'""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`${filename}_${hoje()}.csv`;a.click()}
const SUPABASE_URL='https://quullcxptbiqycyakzlc.supabase.co';
const SUPABASE_KEY='sb_publishable_hHub8WOjVFPavMPjmfGIBA_kDyvO1s6';
const _h={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const db={
  get:async(t,q='')=>{const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}${q}`,{headers:_h});if(!r.ok)throw new Error(await r.text());return r.json()},
  post:async(t,d)=>{const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}`,{method:'POST',headers:_h,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()},
  patch:async(t,id,d)=>{const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:_h,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()},
  delete:async(t,id)=>{const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:_h});if(!r.ok)throw new Error(await r.text());return true},
};
const SESSION_KEY='nuvix_v2_session';
function getSession(){try{const raw=sessionStorage.getItem(SESSION_KEY);if(!raw)return null;const data=JSON.parse(raw);if(Date.now()-data.loginAt>8*60*60*1000){sessionStorage.removeItem(SESSION_KEY);return null}return{...data.user,empresa_id:data.empresa?.id,empresa:data.empresa}}catch{return null}}
function logout(){sessionStorage.removeItem(SESSION_KEY);window.location.href='../index.html'}
function requireAuth(){const s=getSession();if(!s){window.location.href='../index.html';return null}return s}
function withEmpresa(obj){const s=getSession();return{...obj,empresa_id:s?.empresa_id}}
function can(area){const s=getSession();if(!s)return false;if(s.perfil==='Administrador'||s.perfil==='SuperAdmin')return true;return s.perfil?.toLowerCase()===area}
function delBtn(table,id,area){return`<button class="danger" style="font-size:11px;padding:5px 8px" onclick="deleteRow('${table}','${id}','${area}')">Excluir</button>`}
async function deleteRow(table,id,area){if(!can(area)){toast('Sem permissão.','err');return}if(!confirm('Excluir este registro?'))return;try{await db.delete(table,id);toast('Excluído.','ok');await loadData()}catch(e){toast('Erro: '+e.message,'err')}}
</script>

<div class="app-shell">

  <div class="main-content" id="mainContent">

      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="abrirSidebar()">☰</button>
        <div>
          <div style="font-size:16px;font-weight:800" id="topbarTitle">Nuvix</div>
          <div style="font-size:11px;color:var(--muted)" id="topbarSub"></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="trial-badge" id="trialBadge" style="display:none"></span>
        <span style="font-size:13px;font-weight:700" id="userName"></span>
        <span style="font-size:11px;color:var(--p);font-weight:800;background:#f1e7ff;padding:3px 10px;border-radius:99px" id="userRole"></span>

    <!-- CLIENTES -->
    <div id="pg-clientes" class="nx-page page-content">
      <div class="card">
        <h2 id="cliTitulo">Novo cliente</h2>
        <input type="hidden" id="cliId">
        <div class="form-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
          <div class="field" style="grid-column:1/-1"><label>Nome / Razão social</label><input id="cliNome" placeholder="Nome do cliente"></div>
          <div class="field"><label>E-mail</label><input id="cliEmail" type="email"></div>
          <div class="field"><label>Telefone / WhatsApp</label><input id="cliTel" placeholder="(11) 99999-9999"></div>
          <div class="field"><label>CNPJ / CPF</label><input id="cliDoc"></div>
          <div class="field"><label>Cidade / UF</label><input id="cliCidade"></div>
          <div class="field"><label>Segmento</label><input id="cliSeg" placeholder="Ex: Varejo, Logística..."></div>
          <div class="field"><label>Observação</label><input id="cliObs"></div>
        </div>
        <div class="actions">
          <button class="btn" onclick="salvarCliente()">Salvar cliente</button>
          <button class="btn2" onclick="limparCliente()">Limpar</button>
          <button class="btn2" onclick="exportCSV(dados.clientes,'clientes')">Exportar CSV</button>
        </div>
        <div id="cliMsg" class="msg"></div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
          <h2 style="margin:0">Clientes cadastrados</h2>
          <input type="text" id="cliBusca" placeholder="Buscar..." oninput="renderClientes()" style="max-width:260px">
        </div>
        <div class="tablewrap">
          <table>
            <thead><tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th>Cidade</th><th>Segmento</th><th>Ação</th></tr></thead>
            <tbody id="cliTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- RELATÓRIOS -->
    <div id="pg-relatorios" class="nx-page page-content">
      <div class="card">
        <h2>Relatórios</h2>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
          <div class="field"><label>Módulo</label>
            <select id="relModulo">
              <option value="">Selecione...</option>
              <option value="financeiro">Financeiro</option>
              <option value="clientes">Clientes</option>
              <option value="colaboradores">Colaboradores</option>
              <option value="transporte">Transporte</option>
              <option value="servicos_orcamentos">Orçamentos</option>
              <option value="crm_oportunidades">CRM</option>

          <button class="btn" onclick="gerarRelatorio()">Gerar</button>
          <button class="btn2" onclick="exportarRelatorio()">Exportar CSV</button>
        </div>
        <div id="relInfo" class="muted" style="margin-bottom:12px;font-size:13px"></div>
        <div class="tablewrap"><div id="relConteudo"></div></div>

    <!-- MINHA EMPRESA -->
    <div id="pg-empresa" class="nx-page page-content">

          <div class="field"><label>Razão social</label><input id="empRazao"></div>

          <div class="field"><label>Cidade / UF</label><input id="empCidade"></div>
          <div class="field"><label>Telefone</label><input id="empTel"></div>
          <div class="field"><label>E-mail</label><input id="empEmail"></div>
          <div class="field"><label>Regime tributário</label>

              <option>Simples Nacional</option>
              <option>Lucro Presumido</option>

    <!-- USUÁRIOS -->
    <div id="pg-usuarios" class="nx-page page-content">

            <select id="usrPerfil">
              <option>Administrador</option><option>Financeiro</option>

<script>
const session = requireAuth();
let dados = { clientes:[], usuarios:[] };
let _relDados = [];

async function init() {
  if (!session) return;
  $('userName').textContent = session.nome||'';
  $('userRole').textContent = session.perfil||'';
  const emp = session.empresa;
  if (emp) {
    $('sidebarSub').textContent = (emp.fantasia||emp.razao||'')+' · '+(emp.segmento||emp.tipo||'');
    $('topbarSub').textContent  = (emp.fantasia||emp.razao||'')+' · '+(emp.plano||'');
    if (emp.trial_fim) {
      const dias=Math.ceil((new Date(emp.trial_fim)-new Date())/864e5);
      if(dias>0){$('trialBadge').textContent=`Trial: ${dias} dias`;$('trialBadge').style.display='inline-block';}
    }
    const seg=emp.segmento||emp.tipo||'';
    if(seg==='Prestação de Serviço'||seg==='Mista') document.querySelectorAll('.nx-menu-servico').forEach(el=>el.style.display='');
    if(seg==='Transporte'||seg==='Mista')           document.querySelectorAll('.nx-menu-transporte').forEach(el=>el.style.display='');
    if($('empFantasia')) $('empFantasia').value=emp.fantasia||'';
    if($('empRazao'))    $('empRazao').value=emp.razao||'';
    if($('empCnpj'))     $('empCnpj').value=emp.cnpj||'';
    if($('empCidade'))   $('empCidade').value=emp.cidade||'';
    if($('empTel'))      $('empTel').value=emp.telefone||'';
    if($('empEmail'))    $('empEmail').value=emp.email||'';
    if($('empSegmento')) $('empSegmento').value=seg||'Prestação de Serviço';
  }
  // Redireciona para dashboard
  irPara('dashboard.html');
}

function irPara(pagina){ window.location.href=pagina; }

function navegar(pagina, btn) {
  document.querySelectorAll('.nx-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sidebar-btn').forEach(b=>b.classList.remove('active'));
  const pg=$('pg-'+pagina); if(pg) pg.classList.add('active');
  if(btn) btn.classList.add('active');
  const titles={clientes:'Clientes',relatorios:'Relatórios',empresa:'Minha Empresa',usuarios:'Usuários e Acessos'};
  $('topbarTitle').textContent=titles[pagina]||pagina;
  fecharSidebar();
  loadData();
}

async function loadData() {
  if(!session?.empresa_id) return;
  const q=`?select=*&empresa_id=eq.${session.empresa_id}&order=created_at.desc`;
  try {
    [dados.clientes,dados.usuarios]=await Promise.all([db.get('clientes',q),db.get('usuarios',q)]);
    renderClientes(); renderUsuarios();
  } catch(e){ toast('Erro ao carregar: '+e.message,'err'); }
}

// CLIENTES
async function salvarCliente() {
  if(!can('comercial')){toast('Sem permissão.','err');return;}
  const nome=val('cliNome').trim();
  if(!nome){msg('cliMsg','Informe o nome.','err');return;}
  const id=val('cliId');
  const payload=withEmpresa({nome,email:val('cliEmail').trim(),telefone:val('cliTel').trim(),documento:val('cliDoc').trim(),cidade:val('cliCidade').trim(),segmento:val('cliSeg').trim(),observacao:val('cliObs').trim()||null});
  try {
    if(id) await db.patch('clientes',id,payload);
    else   await db.post('clientes',payload);
    msg('cliMsg',id?'Cliente atualizado!':'Cliente salvo!','ok');
    limparCliente(); await loadData();
  } catch(e){msg('cliMsg','Erro: '+e.message,'err');}
}
function editarCliente(id){
  const c=dados.clientes.find(x=>x.id===id);if(!c)return;
  $('cliId').value=c.id;$('cliNome').value=c.nome||'';$('cliEmail').value=c.email||'';
  $('cliTel').value=c.telefone||'';$('cliDoc').value=c.documento||'';
  $('cliCidade').value=c.cidade||'';$('cliSeg').value=c.segmento||'';$('cliObs').value=c.observacao||'';
  $('cliTitulo').textContent='Editar cliente';window.scrollTo({top:0,behavior:'smooth'});
}
function limparCliente(){['cliId','cliNome','cliEmail','cliTel','cliDoc','cliCidade','cliSeg','cliObs'].forEach(id=>{if($(id))$(id).value=''});$('cliTitulo').textContent='Novo cliente';}
function renderClientes(){
  const q=val('cliBusca').toLowerCase();
  const lista=(dados.clientes||[]).filter(c=>(c.nome||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q));
  setHTML('cliTable',lista.map(c=>`<tr><td><b>${esc(c.nome||'')}</b></td><td>${esc(c.email||'—')}</td><td>${esc(c.telefone||'—')}</td><td>${esc(c.cidade||'—')}</td><td>${esc(c.segmento||'—')}</td><td><div style="display:flex;gap:4px"><button class="btn2" onclick="editarCliente('${c.id}')" style="font-size:11px;padding:5px 8px">Editar</button>${delBtn('clientes',c.id,'comercial')}</div></td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">Nenhum cliente.</td></tr>');
}

// RELATÓRIOS
async function gerarRelatorio(){
  const modulo=val('relModulo');if(!modulo)return;
  let q=`?select=*&empresa_id=eq.${session.empresa_id}&order=created_at.desc`;
  const de=val('relDe');const ate=val('relAte');
  if(de) q+=`&created_at=gte.${de}`;
  if(ate) q+=`&created_at=lte.${ate}T23:59:59`;
  try {
    setHTML('relConteudo','<p class="muted">Carregando...</p>');
    _relDados=await db.get(modulo,q);
    if(!_relDados.length){setHTML('relConteudo','<p class="muted" style="text-align:center;padding:20px">Nenhum registro.</p>');setHTML('relInfo','');return;}
    setHTML('relInfo',`${_relDados.length} registros encontrados.`);
    const cols=Object.keys(_relDados[0]).filter(k=>!['empresa_id','id'].includes(k));
    setHTML('relConteudo',`<table style="width:100%;font-size:12px;border-collapse:collapse"><thead><tr>${cols.map(k=>`<th style="text-align:left;padding:8px;color:var(--muted);font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--line);white-space:nowrap">${k.replace(/_/g,' ')}</th>`).join('')}</tr></thead><tbody>${_relDados.map(r=>`<tr>${cols.map(c=>`<td style="padding:8px;border-bottom:1px solid var(--line);white-space:nowrap">${esc(String(r[c]??''))}</td>`).join('')}</tr>`).join('')}</tbody></table>`);
  } catch(e){setHTML('relConteudo',`<p class="muted">Erro: ${e.message}</p>`);}
}
function exportarRelatorio(){if(!_relDados.length){toast('Gere o relatório primeiro.','err');return;}exportCSV(_relDados,val('relModulo')||'relatorio');}

// EMPRESA
async function salvarEmpresa(){
  if(!can('admin')){toast('Sem permissão.','err');return;}
  if(!session?.empresa_id){msg('empMsg','Empresa não encontrada.','err');return;}
  const seg=val('empSegmento');
  try {
    await db.patch('empresas',session.empresa_id,{fantasia:val('empFantasia').trim(),razao:val('empRazao').trim(),cnpj:val('empCnpj').trim(),cidade:val('empCidade').trim(),telefone:val('empTel').trim(),email:val('empEmail').trim(),regime:val('empRegime'),segmento:seg,tipo:seg});
    msg('empMsg','✅ Empresa salva! Faça logout e login novamente para aplicar alterações.','ok');
  } catch(e){msg('empMsg','Erro: '+e.message,'err');}
}

// USUÁRIOS
async function salvarUsuario(){
  if(!can('admin')){toast('Sem permissão.','err');return;}
  const nome=val('usrNome').trim();const email=val('usrEmail').trim().toLowerCase();const senha=val('usrSenha').trim();
  if(!nome||!email||!senha){msg('usrMsg','Preencha todos os campos.','err');return;}
  if(senha.length<4){msg('usrMsg','Senha muito curta.','err');return;}
  try {
    await db.post('usuarios',{nome,email,senha,perfil:val('usrPerfil'),empresa_id:session.empresa_id,ativo:true});
    msg('usrMsg','Usuário criado!','ok');
    ['usrNome','usrEmail','usrSenha'].forEach(id=>{if($(id))$(id).value=''});
    await loadData();
  } catch(e){msg('usrMsg','Erro: '+e.message,'err');}
}
async function resetSenhaUsuario(id,nome){
  const nova=prompt(`Nova senha para ${nome}:`);
  if(!nova||nova.length<4){toast('Senha muito curta.','err');return;}
  try{await db.patch('usuarios',id,{senha:nova});toast('Senha redefinida!','ok');}catch(e){toast('Erro: '+e.message,'err');}
}
async function toggleUsuario(id,ativar){
  try{await db.patch('usuarios',id,{ativo:ativar});toast(ativar?'Ativado.':'Inativado.','ok');await loadData();}catch(e){toast('Erro: '+e.message,'err');}
}
function renderUsuarios(){
  setHTML('usrTable',(dados.usuarios||[]).map(u=>`<tr><td><b>${esc(u.nome||'')}</b></td><td style="color:var(--muted);font-size:12px">${esc(u.email||'')}</td><td><span class="badge">${esc(u.perfil||'')}</span></td><td style="font-size:12px;color:var(--muted)">${u.ultimo_acesso?fmtData(u.ultimo_acesso):'—'}</td><td><span class="badge ${u.ativo!==false?'ok':'bad'}">${u.ativo!==false?'Ativo':'Inativo'}</span></td><td><div style="display:flex;gap:4px;flex-wrap:wrap"><button class="btn2" onclick="resetSenhaUsuario('${u.id}','${esc(u.nome||'')}')" style="font-size:11px;padding:5px 8px">🔑 Senha</button>${u.ativo!==false?`<button class="danger" onclick="toggleUsuario('${u.id}',false)" style="font-size:11px;padding:5px 8px">Inativar</button>`:`<button class="btn2" onclick="toggleUsuario('${u.id}',true)" style="font-size:11px;padding:5px 8px">Ativar</button>`}${delBtn('usuarios',u.id,'admin')}</div></td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">Nenhum usuário.</td></tr>');
}

function abrirSidebar(){$('sidebar').classList.add('open');$('sidebarOverlay').classList.add('open');document.body.style.overflow='hidden'}
function fecharSidebar(){$('sidebar').classList.remove('open');$('sidebarOverlay').classList.remove('open');document.body.style.overflow=''}

init();
</script>
</body>
