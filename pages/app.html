/* ── Scroll fix ── */
.page-content{padding:24px}

.nx-page.active{display:block}

/* Garante que main-content scrolle normalmente */
.main-content{
  display:flex;
  flex-direction:column;
  overflow-y:auto !important;
  overflow-x:hidden;
  height:100vh;
}
/* Topbar fixo no topo */
.topbar{
  flex-shrink:0;
  position:sticky;
  top:0;
  z-index:30;
}
/* Páginas crescem naturalmente */
.nx-page.active{
  display:block;
  flex:1;
  min-height:0;
}

@media(max-width:768px){
  #hambBtn{display:block!important}
  .page-content{padding:16px}
  .form-row{grid-template-columns:1fr!important}
}

<script>
function $(id){return document.getElementById(id)}
function val(id){const e=$(id);return e?e.value:''}
function num(id){const e=$(id);return e?Number(e.value||0):0}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function fmtData(d){if(!d)return'—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function hoje(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function setHTML(id,html){const e=$(id);if(e)e.innerHTML=html}
function msg(id,text,type='ok'){const e=$(id);if(!e){toast(text,type);return}e.textContent=text;e.className=`msg show ${type}`;setTimeout(()=>e.classList.remove('show'),5000)}
function toast(text,type='ok'){document.querySelector('.nx-toast')?.remove();const t=document.createElement('div');t.className=`nx-toast ${type}`;t.textContent=text;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0'},3000);setTimeout(()=>t.remove(),3400)}
function exportCSV(data,filename){if(!data?.length){toast('Nada para exportar.','err');return}const cols=Object.keys(data[0]);const csv=[cols.join(','),...data.map(r=>cols.map(c=>`"${String(r[c]??'').replace(/"/g,'""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`${filename}_${hoje()}.csv`;a.click()}
const SUPABASE_URL='https://quullcxptbiqycyakzlc.supabase.co';
const SUPABASE_KEY='sb_publishable_hHub8WOjVFPavMPjmfGIBA_kDyvO1s6';
const _h={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const db={
  get:async(t,q='')=>{const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}${q}`,{headers:_h});if(!r.ok)throw new Error(await r.text());return r.json()},
  post:async(t,d)=>{const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}`,{method:'POST',headers:_h,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()},
  patch:async(t,id,d)=>{const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:_h,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()},
  delete:async(t,id)=>{const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:_h});if(!r.ok)throw new Error(await r.text());return true},
};
const SESSION_KEY='nuvix_v2_session';
function getSession(){try{const raw=sessionStorage.getItem(SESSION_KEY);if(!raw)return null;const data=JSON.parse(raw);if(Date.now()-data.loginAt>8*60*60*1000){sessionStorage.removeItem(SESSION_KEY);return null}return{...data.user,empresa_id:data.empresa?.id,empresa:data.empresa}}catch{return null}}
function logout(){sessionStorage.removeItem(SESSION_KEY);window.location.href='../index.html'}
function requireAuth(){const s=getSession();if(!s){window.location.href='../index.html';return null}return s}
function withEmpresa(obj){const s=getSession();return{...obj,empresa_id:s?.empresa_id}}
function can(area){const s=getSession();if(!s)return false;if(s.perfil==='Administrador'||s.perfil==='SuperAdmin')return true;return s.perfil?.toLowerCase()===area}
function delBtn(table,id,area){return`<button class="danger" style="font-size:11px;padding:5px 8px" onclick="deleteRow('${table}','${id}','${area}')">Excluir</button>`}
async function deleteRow(table,id,area){if(!can(area)){toast('Sem permissão.','err');return}if(!confirm('Excluir este registro?'))return;try{await db.delete(table,id);toast('Excluído.','ok');await loadData()}catch(e){toast('Erro: '+e.message,'err')}}
</script>

<script>
(function(){

    const raw=sessionStorage.getItem('nuvix_v2_session');

function abrirSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open');document.body.style.overflow='hidden'}
function fecharSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');document.body.style.overflow=''}
function initials(n){if(!n)return'?';return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
</script>

<script>
const session = requireAuth();
let dados = { clientes:[], usuarios:[] };
let _relDados = [];

async function init() {
  if (!session) return;
  $('userName').textContent = session.nome||'';
  $('userAvatar').textContent = initials(session.nome||'');
  const emp = session.empresa;
  if (emp) {
    $('topbarSub').textContent = (emp.fantasia||emp.razao||'')+' · '+(emp.plano||'');
    if(emp.trial_fim){const dias=Math.ceil((new Date(emp.trial_fim)-new Date())/864e5);if(dias>0){$('trialBadge').textContent=`Trial: ${dias} dias`;$('trialBadge').style.display='inline-block';}}
    const seg=emp.segmento||emp.tipo||'';
    if($('empFantasia'))$('empFantasia').value=emp.fantasia||'';
    if($('empRazao'))$('empRazao').value=emp.razao||'';
    if($('empCnpj'))$('empCnpj').value=emp.cnpj||'';
    if($('empCidade'))$('empCidade').value=emp.cidade||'';
    if($('empTel'))$('empTel').value=emp.telefone||'';
    if($('empEmail'))$('empEmail').value=emp.email||'';
    if($('empSegmento'))$('empSegmento').value=seg||'Prestação de Serviço';
  }
  navegar('clientes', null);
  loadData();
}

function irPara(pagina){ window.location.href=pagina; }
function navegar(pagina, btn) {
  document.querySelectorAll('.nx-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sidebar-icon-btn').forEach(b=>b.classList.remove('active'));
  const pg=$('pg-'+pagina); if(pg) pg.classList.add('active');
  const titles={clientes:'Clientes',relatorios:'Relatórios',empresa:'Minha Empresa',usuarios:'Usuários e Acessos'};
  const titleEl=$('topbarTitle'); if(titleEl) titleEl.textContent=titles[pagina]||pagina;
  // Scroll para o topo ao trocar de página
  const mc=$('mainContent'); if(mc) mc.scrollTop=0;
  fecharSidebar();
  loadData();
}

function navegarSidebar(pagina, btnId) {
  // Remove active de todos os botões da sidebar
  document.querySelectorAll('.sidebar-icon-btn').forEach(b=>b.classList.remove('active'));
  // Ativa o botão correto
  const btn=$(btnId); if(btn) btn.classList.add('active');
  navegar(pagina, null);
}

async function loadData() {
  if(!session?.empresa_id) return;
  const q=`?select=*&empresa_id=eq.${session.empresa_id}&order=created_at.desc`;
  try {
    [dados.clientes,dados.usuarios]=await Promise.all([db.get('clientes',q),db.get('usuarios',q)]);
    renderClientes(); renderUsuarios();
  } catch(e){ toast('Erro ao carregar: '+e.message,'err'); }
}

async function salvarCliente() {
  if(!can('comercial')){toast('Sem permissão.','err');return;}
  const nome=val('cliNome').trim();if(!nome){msg('cliMsg','Informe o nome.','err');return;}
  const id=val('cliId');
  const payload=withEmpresa({nome,email:val('cliEmail').trim(),telefone:val('cliTel').trim(),documento:val('cliDoc').trim(),cidade:val('cliCidade').trim(),segmento:val('cliSeg').trim()});
  try{if(id)await db.patch('clientes',id,payload);else await db.post('clientes',payload);msg('cliMsg',id?'Cliente atualizado!':'Cliente salvo!','ok');limparCliente();await loadData();}catch(e){msg('cliMsg','Erro: '+e.message,'err');}
}
function editarCliente(id){const c=dados.clientes.find(x=>x.id===id);if(!c)return;$('cliId').value=c.id;$('cliNome').value=c.nome||'';$('cliEmail').value=c.email||'';$('cliTel').value=c.telefone||'';$('cliDoc').value=c.documento||'';$('cliCidade').value=c.cidade||'';$('cliSeg').value=c.segmento||'';$('cliObs').value=c.observacao||'';$('cliTitulo').textContent='Editar cliente';window.scrollTo({top:0,behavior:'smooth'});}
function limparCliente(){['cliId','cliNome','cliEmail','cliTel','cliDoc','cliCidade','cliSeg','cliObs'].forEach(id=>{if($(id))$(id).value=''});$('cliTitulo').textContent='Novo cliente';}
function renderClientes(){const q=val('cliBusca').toLowerCase();const lista=(dados.clientes||[]).filter(c=>(c.nome||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q));setHTML('cliTable',lista.map(c=>`<tr><td><b>${esc(c.nome||'')}</b></td><td>${esc(c.email||'—')}</td><td>${esc(c.telefone||'—')}</td><td>${esc(c.cidade||'—')}</td><td>${esc(c.segmento||'—')}</td><td><div style="display:flex;gap:4px"><button class="btn2" onclick="editarCliente('${c.id}')" style="font-size:11px;padding:5px 8px">Editar</button>${delBtn('clientes',c.id,'comercial')}</div></td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">Nenhum cliente.</td></tr>');}

const COLS_MODULO={financeiro:['tipo','categoria','descricao','valor','data_lancamento','vencimento','status','forma_pagamento','favorecido','centro_custo'],clientes:['nome','email','telefone','documento','cidade','segmento'],colaboradores:['nome','cargo','departamento','salario','data_admissao','tipo_contrato','cpf','telefone','email'],transporte:['data_lancamento','ppe','cliente_nome','motorista_nome','origem','destino','receita','custo','status'],servicos_orcamentos:['cliente_nome','servico_nome','quantidade','valor_unitario','valor_total','status','validade'],crm_oportunidades:['nome','empresa_nome','valor_previsto','status','proximo_contato','responsavel'],ponto:['colaborador_nome','data','entrada','saida','horas_trabalhadas','horas_extras','tipo']};
async function gerarRelatorio(){
  const modulo=val('relModulo');if(!modulo)return;
  let q=`?select=*&empresa_id=eq.${session.empresa_id}&order=created_at.desc`;
  const de=val('relDe');const ate=val('relAte');
  if(de)q+=`&created_at=gte.${de}`;if(ate)q+=`&created_at=lte.${ate}T23:59:59`;
  try{
    setHTML('relConteudo','<p class="muted">Carregando...</p>');
    _relDados=await db.get(modulo,q);
    if(!_relDados.length){setHTML('relConteudo','<p class="muted" style="text-align:center;padding:20px">Nenhum registro.</p>');setHTML('relInfo','');return;}
    setHTML('relInfo',`${_relDados.length} registros encontrados.`);
    const todasCols=Object.keys(_relDados[0]);
    const colsFiltradas=COLS_MODULO[modulo]?COLS_MODULO[modulo].filter(c=>todasCols.includes(c)):todasCols.filter(k=>!['empresa_id','id','created_at','updated_at'].includes(k));
    const nomeCol={tipo:'Tipo',categoria:'Categoria',descricao:'Descrição',valor:'Valor',data_lancamento:'Data',vencimento:'Vencimento',status:'Status',forma_pagamento:'Forma Pgto',favorecido:'Favorecido',centro_custo:'Centro Custo',nome:'Nome',email:'E-mail',telefone:'Telefone',documento:'CNPJ/CPF',cidade:'Cidade',segmento:'Segmento',cargo:'Cargo',departamento:'Dept',salario:'Salário',data_admissao:'Admissão',tipo_contrato:'Contrato',cpf:'CPF',ppe:'PPE',cliente_nome:'Cliente',motorista_nome:'Motorista',origem:'Origem',destino:'Destino',receita:'Receita',custo:'Custo',servico_nome:'Serviço',quantidade:'Qtd',valor_unitario:'Vlr Unit',valor_total:'Total',validade:'Validade',empresa_nome:'Empresa',valor_previsto:'Vlr Previsto',proximo_contato:'Próx Contato',responsavel:'Responsável',colaborador_nome:'Colaborador',data:'Data',entrada:'Entrada',saida:'Saída',horas_trabalhadas:'Horas',horas_extras:'HE'};
    setHTML('relConteudo',`<table style="width:100%;font-size:12px;border-collapse:collapse"><thead><tr>${colsFiltradas.map(k=>`<th style="text-align:left;padding:8px;color:var(--muted);font-size:10px;text-transform:uppercase;border-bottom:2px solid var(--line);white-space:nowrap">${nomeCol[k]||k.replace(/_/g,' ')}</th>`).join('')}</tr></thead><tbody>${_relDados.map(r=>`<tr>${colsFiltradas.map(c=>{let v=r[c]??'';if(typeof v==='number')v=c.includes('valor')||c==='salario'||c==='receita'||c==='custo'?Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):v;if(String(v).match(/^\d{4}-\d{2}-\d{2}/))v=new Date(v).toLocaleDateString('pt-BR');return`<td style="padding:8px;border-bottom:1px solid var(--line);white-space:nowrap">${esc(String(v))}</td>`;}).join('')}</tr>`).join('')}</tbody></table>`);
  }catch(e){setHTML('relConteudo',`<p class="muted">Erro: ${e.message}</p>`);}
}
function exportarRelatorio(){if(!_relDados.length){toast('Gere o relatório primeiro.','err');return;}exportCSV(_relDados,val('relModulo')||'relatorio');}

async function salvarEmpresa(){
  if(!can('admin')){toast('Sem permissão.','err');return;}
  if(!session?.empresa_id){msg('empMsg','Empresa não encontrada.','err');return;}
  const seg=val('empSegmento');
  try{await db.patch('empresas',session.empresa_id,{fantasia:val('empFantasia').trim(),razao:val('empRazao').trim(),cnpj:val('empCnpj').trim(),cidade:val('empCidade').trim(),telefone:val('empTel').trim(),email:val('empEmail').trim(),regime:val('empRegime'),segmento:seg,tipo:seg});msg('empMsg','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Empresa salva! Faça logout e login novamente para aplicar.','ok');}catch(e){msg('empMsg','Erro: '+e.message,'err');}
}

async function salvarUsuario(){
  if(!can('admin')){toast('Sem permissão.','err');return;}
  const nome=val('usrNome').trim();const email=val('usrEmail').trim().toLowerCase();const senha=val('usrSenha').trim();
  if(!nome||!email||!senha){msg('usrMsg','Preencha todos os campos.','err');return;}
  if(senha.length<4){msg('usrMsg','Senha muito curta.','err');return;}
  try{await db.post('usuarios',{nome,email,senha,perfil:val('usrPerfil'),empresa_id:session.empresa_id,ativo:true});msg('usrMsg','Usuário criado!','ok');['usrNome','usrEmail','usrSenha'].forEach(id=>{if($(id))$(id).value=''});await loadData();}catch(e){msg('usrMsg','Erro: '+e.message,'err');}
}
async function resetSenhaUsuario(id,nome){const nova=prompt(`Nova senha para ${nome}:`);if(!nova||nova.length<4){toast('Senha muito curta.','err');return;}try{await db.patch('usuarios',id,{senha:nova});toast('Senha redefinida!','ok');}catch(e){toast('Erro: '+e.message,'err');}}
async function toggleUsuario(id,ativar){try{await db.patch('usuarios',id,{ativo:ativar});toast(ativar?'Ativado.':'Inativado.','ok');await loadData();}catch(e){toast('Erro: '+e.message,'err');}}
function renderUsuarios(){setHTML('usrTable',(dados.usuarios||[]).map(u=>`<tr><td><b>${esc(u.nome||'')}</b></td><td style="color:var(--muted);font-size:12px">${esc(u.email||'')}</td><td><span class="badge">${esc(u.perfil||'')}</span></td><td style="font-size:12px;color:var(--muted)">${u.ultimo_acesso?fmtData(u.ultimo_acesso):'—'}</td><td><span class="badge ${u.ativo!==false?'ok':'bad'}">${u.ativo!==false?'Ativo':'Inativo'}</span></td><td><div style="display:flex;gap:4px;flex-wrap:wrap"><button class="btn2" onclick="resetSenhaUsuario('${u.id}','${esc(u.nome||'')}')" style="font-size:11px;padding:5px 8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M21 2l-9.6 9.6"/><path d="M15.5 7.5l3 3L22 7l-3-3"/></svg> Senha</button>${u.ativo!==false?`<button class="danger" onclick="toggleUsuario('${u.id}',false)" style="font-size:11px;padding:5px 8px">Inativar</button>`:`<button class="btn2" onclick="toggleUsuario('${u.id}',true)" style="font-size:11px;padding:5px 8px">Ativar</button>`}${delBtn('usuarios',u.id,'admin')}</div></td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px">Nenhum usuário.</td></tr>');}

init();
</script>
<script>
// ── Sidebar dinâmica por segmento ──
(function(){
  try{
    const raw = sessionStorage.getItem('nuvix_v2_session');
    if(!raw) return;
    const d = JSON.parse(raw);
    const seg = (d.empresa?.segmento || d.empresa?.tipo || '').toLowerCase();
    const nav = document.getElementById('sidebar');
    if(!nav) return;

    const logo = nav.querySelector('.sidebar-logo');
    const configBtn = nav.querySelector('[href="parametros.html"]')?.closest('.sb-group');

    // Determine which groups to show
    const isTransporte = seg.includes('transporte');
    const isServico = seg.includes('serviço') || seg.includes('servico') || seg.includes('serviços') || seg.includes('prestação');
    const isMista = seg.includes('mista') || (!isTransporte && !isServico);

    // Hide all dynamic groups (keep logo and config)
    nav.querySelectorAll('.sb-group').forEach(g => {
      if(!g.style.marginTop) g.style.display = 'none';
    });

    // Build groups based on segment
    let html = '';

    // PRINCIPAL - always
    html += `<div class="sb-group">
      <div class="sb-group-label">Principal</div>
      <a class="sb-btn" href="dashboard.html" data-tip="Dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Dashboard</span></a>
      <a class="sb-btn" href="financeiro.html" data-tip="Financeiro"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Financeiro</span></a>
      <a class="sb-btn" href="crm.html" data-tip="CRM / Comercial"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>CRM</span></a>
    </div>`;

    // SERVIÇOS
    if(isServico || isMista){
      html += `<div class="sb-group">
        <div class="sb-group-label">Serviços</div>
        <a class="sb-btn" href="os.html" data-tip="Ordens de Serviço"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg><span>Ordens de Serviço</span></a>
        <a class="sb-btn" href="servicos.html" data-tip="Serviços e Orçamentos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>Serviços</span></a>
        <a class="sb-btn" href="materiais.html" data-tip="Materiais e Estoque"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg><span>Materiais</span></a>
      </div>`;
    }

    // TRANSPORTE
    if(isTransporte || isMista){
      html += `<div class="sb-group">
        <div class="sb-group-label">Transporte</div>
        <a class="sb-btn" href="transporte.html" data-tip="Operações"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><span>Transporte</span></a>
        <a class="sb-btn" href="cotacao.html" data-tip="Cotação de Frete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Cotação</span></a>
      </div>`;
    }

    // PESSOAS - always
    html += `<div class="sb-group">
      <div class="sb-group-label">Pessoas</div>
      <a class="sb-btn" href="app.html" data-tip="Clientes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Clientes</span></a>
      <a class="sb-btn" href="rh.html" data-tip="RH e Colaboradores"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg><span>RH</span></a>
    </div>`;

    // ANÁLISE - always
    html += `<div class="sb-group">
      <div class="sb-group-label">Análise</div>
      <a class="sb-btn" href="relatorios.html" data-tip="Relatórios"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Relatórios</span></a>
    </div>`;

    // Insert after logo
    logo.insertAdjacentHTML('afterend', html);

    // Mark active page
    const current = window.location.pathname.split('/').pop();
    nav.querySelectorAll('.sb-btn').forEach(btn => {
      if(btn.getAttribute('href') === current){
        btn.classList.add('active');
      }
    });

  }catch(e){ console.warn('Sidebar error:', e); }
})();
</script>
