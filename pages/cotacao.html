<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvix — Cotação de Frete</title>
<link rel="stylesheet" href="../css/nuvix.css">
<style>
.resultado-card{background:linear-gradient(135deg,#5B4CF0,#6D5EF5);color:#fff;border-radius:20px;padding:28px;margin-bottom:16px}
.resultado-valor{font-size:42px;font-weight:800;margin:8px 0}
.resultado-sub{opacity:.8;font-size:13px}
.linha{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.total-linha{display:flex;justify-content:space-between;padding:12px 0;font-size:17px;font-weight:800;color:var(--p)}
@media(max-width:768px){#hambBtn{display:block!important}}
</style>
<script src="../js/nuvix-logs.js"></script>
</head>
<body>
<script>
function $(id){return document.getElementById(id)}
function val(id){const e=$(id);return e?e.value:''}
function num(id){const e=$(id);return e?Number(e.value||0):0}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function fmtData(d){if(!d)return'—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function dataLocal(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function hoje(){return dataLocal(new Date())}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function setHTML(id,html){const e=$(id);if(e)e.innerHTML=html}
function msg(id,text,type='ok'){const e=$(id);if(!e){toast(text,type);return}e.textContent=text;e.className=`msg show ${type}`;setTimeout(()=>e.classList.remove('show'),5000)}
function toast(text,type='ok'){document.querySelector('.nx-toast')?.remove();const t=document.createElement('div');t.className=`nx-toast ${type}`;t.textContent=text;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0'},3000);setTimeout(()=>t.remove(),3400)}
function exportCSV(data,filename){if(!data?.length){toast('Nada para exportar.','err');return}const cols=Object.keys(data[0]);const csv=[cols.join(','),...data.map(r=>cols.map(c=>`"${String(r[c]??'').replace(/"/g,'""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`${filename}_${hoje()}.csv`;a.click()}
function initials(n){if(!n)return'?';return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
const SUPABASE_URL='https://quullcxptbiqycyakzlc.supabase.co';
const SUPABASE_KEY='sb_publishable_hHub8WOjVFPavMPjmfGIBA_kDyvO1s6';
const _h={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
function traduzErroGenerico(textoBruto){let m=String(textoBruto||'');try{const obj=JSON.parse(m);m=obj.message||obj.details||obj.hint||m;}catch(e){}if(/duplicate key|already exists/i.test(m))return'Já existe um registro com essa informação.';if(/violates not-null constraint/i.test(m))return'Preencha todos os campos obrigatórios antes de salvar.';if(/violates foreign key constraint/i.test(m))return'Não é possível concluir — esse registro está vinculado a outro cadastro.';return'Algo deu errado. Tente novamente — se continuar, entre em contato com o suporte.';}
const db={get:async(t,q='')=>{let r;try{r=await fetch(`${SUPABASE_URL}/rest/v1/${t}${q}`,{headers:_h});}catch(e){throw new Error('Sem conexão com a internet. Verifique sua rede e tente de novo.');}if(!r.ok)throw new Error(traduzErroGenerico(await r.text()));return r.json()},post:async(t,d)=>{let r;try{r=await fetch(`${SUPABASE_URL}/rest/v1/${t}`,{method:'POST',headers:_h,body:JSON.stringify(d)});}catch(e){throw new Error('Sem conexão com a internet. Verifique sua rede e tente de novo.');}if(!r.ok)throw new Error(traduzErroGenerico(await r.text()));return r.json()},patch:async(t,id,d)=>{let r;try{r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:_h,body:JSON.stringify(d)});}catch(e){throw new Error('Sem conexão com a internet. Verifique sua rede e tente de novo.');}if(!r.ok)throw new Error(traduzErroGenerico(await r.text()));return r.json()},delete:async(t,id)=>{let r;try{r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:_h});}catch(e){throw new Error('Sem conexão com a internet. Verifique sua rede e tente de novo.');}if(!r.ok)throw new Error(traduzErroGenerico(await r.text()));return true}};
const SESSION_KEY='nuvix_v2_session';
function getSession(){try{const raw=sessionStorage.getItem(SESSION_KEY);if(!raw)return null;const data=JSON.parse(raw);if(Date.now()-data.loginAt>8*60*60*1000){sessionStorage.removeItem(SESSION_KEY);return null}return{...data.user,empresa_id:data.empresa?.id,empresa:data.empresa}}catch{return null}}
function logout(){sessionStorage.removeItem(SESSION_KEY);window.location.href='../index.html'}
function requireAuth(){const s=getSession();if(!s){window.location.href='../index.html';return null}return s}
function withEmpresa(obj){const s=getSession();return{...obj,empresa_id:s?.empresa_id}}
function can(area){const s=getSession();if(!s)return false;if(s.perfil==='Administrador'||s.perfil==='SuperAdmin')return true;return s.perfil?.toLowerCase()===area}
</script>
<script>
(function(){
  try{
    const raw=sessionStorage.getItem('nuvix_v2_session');
    if(raw){const data=JSON.parse(raw);const seg=data.empresa?.segmento||data.empresa?.tipo||'';
    if(seg==='Prestação de Serviço'||seg==='Mista') document.querySelectorAll('.nx-menu-servico').forEach(el=>el.style.display='flex');
    if(seg==='Transporte'||seg==='Mista') document.querySelectorAll('.nx-menu-transporte').forEach(el=>el.style.display='flex');}
  }catch(e){}
})();

function fecharSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');document.body.style.overflow=''}
function initials(n){if(!n)return'?';return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
</script>

    </div>
    <div class="sb-group" style="margin-top:auto;border-top:1px solid rgba(255,255,255,.08)">
      <a class="sb-btn" href="parametros.html" data-tip="Configurações"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Configurações</span></a>
    </div>
  </nav>

  <div class="main-content" id="mainContent">
    <div class="topbar">
      <div class="topbar-left">
        <button style="background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--muted);display:none" id="hambBtn" onclick="abrirSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div>
          <div class="topbar-title">Cotação de Frete</div>
          <div class="topbar-breadcrumb" id="topbarSub"></div>
        </div>
      </div>
      <div class="topbar-right">
        <span class="trial-badge" id="trialBadge" style="display:none"></span>
        <div class="topbar-avatar" id="userAvatar">?</div>
        <span class="topbar-username" id="userName"></span>
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>
    </div>
    <div class="main-scroll">
      <div style="padding:24px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div class="card">
            <h2>Dados da carga</h2>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
              <div class="field"><label>Origem</label><input id="f_origem" placeholder="Ex: São Paulo / SP"></div>
              <div class="field"><label>Destino</label><input id="f_destino" placeholder="Ex: Belo Horizonte / MG"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
              <div class="field"><label>Rota cadastrada <span id="rotasStatus" style="font-size:10px;color:var(--muted)"></span></label><select id="f_rota" onchange="aplicarRota()"><option value="">Carregando...</option></select></div>
              <div class="field"><label>Tipo de veículo</label><select id="f_veiculo"><option>Van</option><option>Caminhão leve</option><option selected>Caminhão pesado</option><option>Carreta</option></select></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
              <div class="field"><label>Distância (km)</label><input id="f_km" type="number" placeholder="586"></div>
              <div class="field"><label>Valor por km (R$)</label><input id="f_vkm" type="number" step="0.01" value="4.50"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
              <div class="field"><label>Pedágio (R$)</label><input id="f_pedagio" type="number" step="0.01" value="0"></div>
              <div class="field"><label>Peso (kg)</label><input id="f_peso" type="number" placeholder="8500"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
              <div class="field"><label>Tipo de carga</label><select id="f_tipo"><option>Carga geral</option><option>Frigorificada (+20%)</option><option>Perigosa (+25%)</option><option>Granel</option><option>Mudança (+5%)</option></select></div>
              <div class="field"><label>Margem de lucro (%)</label><input id="f_margem" type="number" value="30"></div>
            </div>
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line)">
              <div style="font-size:12px;font-weight:700;color:var(--p);margin-bottom:12px;text-transform:uppercase">Dados do solicitante</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="field"><label>Nome / Empresa</label><input id="f_nome" placeholder="Empresa Ltda"></div>
                <div class="field"><label>Telefone</label><input id="f_tel" placeholder="(11) 99999-9999"></div>
                <div class="field"><label>E-mail</label><input id="f_email" type="email"></div>
                <div class="field"><label>Validade</label><input id="f_validade" type="date"></div>
              </div>
            </div>
            <!-- ══ MATERIAIS PREVISTOS ══ -->
            <div style="margin-top:20px;padding-top:20px;border-top:2px solid var(--line)">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <div>
                  <div style="font-size:14px;font-weight:800"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Materiais previstos</div>
                  <div style="font-size:11px;color:var(--muted);margin-top:2px">Apenas previsão de custo — não afeta o estoque</div>
                </div>
                <button onclick="addMatCot()" style="background:var(--p-light);color:var(--p);border:1.5px solid var(--line);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer">+ Material</button>
              </div>
              <div id="matCotLista"></div>
              <div id="matCotTotais" style="display:none;background:var(--p-light);border-radius:12px;padding:12px 16px;margin-top:10px;display:none">
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center">
                  <div><div style="font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase">Custo total</div><div style="font-size:15px;font-weight:800" id="cotCustoMat">R$ 0,00</div></div>
                  <div><div style="font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase">Lucro previsto</div><div style="font-size:15px;font-weight:800;color:var(--green)" id="cotLucroMat">R$ 0,00</div></div>
                  <div><div style="font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase">Margem</div><div style="font-size:15px;font-weight:800;color:var(--p)" id="cotMargemMat">0%</div></div>
                </div>
              </div>
            </div>

            <div class="actions" style="margin-top:20px">
              <button class="btn" style="background:var(--green)" onclick="calcular()">Calcular</button>
              <button class="btn" onclick="salvar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Salvar</button>
              <button class="btn2" onclick="imprimir()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Imprimir</button>
            </div>
            <div id="msg" class="msg"></div>
          </div>
          <div id="resultado">
            <div class="card" style="text-align:center;padding:48px">
              <div style="font-size:48px;margin-bottom:12px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
              <p class="muted">Preencha os dados e clique em <b>Calcular</b></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const session = getSession();
if(session?.nome) document.getElementById('userName').textContent = session.nome;
if(session) document.getElementById('userAvatar').textContent = initials(session.nome||'');

const v7=new Date();v7.setDate(v7.getDate()+7);
document.getElementById('f_validade').value=dataLocal(v7);

let cotAtual=null,rotas=[];

async function carregarRotas(){
  const sel=document.getElementById('f_rota'),status=document.getElementById('rotasStatus');
  try{
    const empresaId=session?.empresa_id;
    const query=empresaId?`/rest/v1/rotas?select=*&empresa_id=eq.${empresaId}&order=apelido`:`/rest/v1/rotas?select=*&order=apelido`;
    const r=await fetch(SUPABASE_URL+query,{headers:_h});
    if(!r.ok)throw new Error('Erro '+r.status);
    rotas=await r.json();
    sel.innerHTML='<option value="">Selecione uma rota (opcional)</option>'+rotas.map(r=>`<option value="${r.id}" data-km="${r.distancia_km||0}" data-vkm="${r.valor_km||0}" data-pedagio="${r.pedagio||0}" data-origem="${esc(r.origem||'')}" data-destino="${esc(r.destino||'')}" data-fixo="${r.preco_fixo||0}">${esc(r.apelido||r.origem+'→'+r.destino)} (${r.distancia_km||0}km)</option>`).join('');
    status.textContent=rotas.length+' rotas';
  }catch(e){sel.innerHTML='<option value="">Sem rotas — preencha manualmente</option>';status.textContent='erro';}
}

function aplicarRota(){const sel=document.getElementById('f_rota');if(!sel.value)return;const opt=sel.options[sel.selectedIndex];if(opt.dataset.origem)document.getElementById('f_origem').value=opt.dataset.origem;if(opt.dataset.destino)document.getElementById('f_destino').value=opt.dataset.destino;if(opt.dataset.km&&Number(opt.dataset.km)>0)document.getElementById('f_km').value=opt.dataset.km;if(opt.dataset.vkm&&Number(opt.dataset.vkm)>0)document.getElementById('f_vkm').value=opt.dataset.vkm;if(opt.dataset.pedagio)document.getElementById('f_pedagio').value=opt.dataset.pedagio;}

function calcular(){
  const km=Number(document.getElementById('f_km').value)||0,vkm=Number(document.getElementById('f_vkm').value)||3.5,pedagio=Number(document.getElementById('f_pedagio').value)||0,margem=Number(document.getElementById('f_margem').value)||30,tipo=document.getElementById('f_tipo').value,origem=document.getElementById('f_origem').value,destino=document.getElementById('f_destino').value,peso=Number(document.getElementById('f_peso').value)||0;
  const sel=document.getElementById('f_rota'),opt=sel?.value?sel.options[sel.selectedIndex]:null,precoFixo=opt?Number(opt.dataset.fixo||0):0;
  if(!km&&!precoFixo){alert('Informe a distância em km ou selecione uma rota!');return;}
  const custoBase=precoFixo>0?precoFixo:km*vkm,custoTotal=custoBase+pedagio,valorBruto=custoTotal*(1+margem/100);
  const adicionais={'Frigorificada (+20%)':0.20,'Perigosa (+25%)':0.25,'Mudança (+5%)':0.05},adicPct=adicionais[tipo]||0,valorFinal=valorBruto*(1+adicPct),lucro=valorFinal-custoTotal;
  cotAtual={origem,destino,km,vkm,pedagio,peso,tipo,margem,custo_total:custoTotal,valor_frete:valorFinal,lucro,solicitante:document.getElementById('f_nome').value,telefone:document.getElementById('f_tel').value,email:document.getElementById('f_email').value,validade:document.getElementById('f_validade').value,veiculo:document.getElementById('f_veiculo').value};
  document.getElementById('resultado').innerHTML=`<div class="resultado-card"><div style="font-size:12px;font-weight:700;text-transform:uppercase;opacity:.8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg> Valor do frete</div><div class="resultado-valor">${money(valorFinal)}</div><div class="resultado-sub">${esc(origem)||'Origem'} → ${esc(destino)||'Destino'} · ${km} km</div></div><div class="card"><h3 style="font-size:14px;font-weight:700;margin-bottom:14px">Composição</h3><div class="linha"><span>${precoFixo>0?'Preço fixo da rota':`Frete (${km}km × R$${vkm.toFixed(2)}/km)`}</span><b>${money(custoBase)}</b></div>${pedagio>0?`<div class="linha"><span>Pedágio</span><b>${money(pedagio)}</b></div>`:''}${adicPct>0?`<div class="linha"><span>Adicional ${tipo}</span><b>+${(adicPct*100).toFixed(0)}%</b></div>`:''}<div class="linha"><span>Margem (${margem}%)</span><b>${money(lucro)}</b></div><div class="total-linha"><span>Total</span><b>${money(valorFinal)}</b></div><div style="font-size:12px;color:var(--green);font-weight:700;margin-top:4px">Lucro estimado: ${money(lucro)} · Custo: ${money(custoTotal)}</div></div>`;
}

async function salvar(){
  if(!cotAtual){calcular();if(!cotAtual)return;}
  const msgEl=document.getElementById('msg');
  try{const r=await fetch(SUPABASE_URL+'/rest/v1/cotacoes_frete',{method:'POST',headers:_h,body:JSON.stringify({...cotAtual,empresa_id:session?.empresa_id||null,status:'Pendente',data_cotacao:hoje()})});if(!r.ok)throw new Error(await r.text());msgEl.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Cotação salva!';msgEl.className='msg show ok';setTimeout(()=>msgEl.classList.remove('show'),4000);}catch(e){msgEl.textContent='Erro: '+e.message;msgEl.className='msg show err';}
}

function imprimir(){
  if(!cotAtual){calcular();if(!cotAtual)return;}

// ══ MATERIAIS NA COTAÇÃO ══
let matsCot = [];
let materiaisDisponiveis = [];

async function carregarMateriaisCot(){
  try{
    const empId=session?.empresa_id;
    if(!empId)return;
    materiaisDisponiveis=await fetch(`${SUPABASE_URL}/rest/v1/materiais?empresa_id=eq.${empId}&status=eq.Ativo&order=nome.asc`,{headers:_h}).then(r=>r.json());
  }catch(e){console.warn('Materiais não disponíveis');}
}

function addMatCot(){
  matsCot.push({material_id:'',nome:'',qtd:1,custo:0,venda:0});
  renderMatCot();
}

function removeMatCot(i){
  matsCot.splice(i,1);
  renderMatCot();
}

function renderMatCot(){
  const el=document.getElementById('matCotLista');
  const tot=document.getElementById('matCotTotais');
  if(!el)return;
  if(!matsCot.length){el.innerHTML='<p style="color:var(--muted);font-size:12px;text-align:center;padding:10px">Nenhum material adicionado.</p>';if(tot)tot.style.display='none';return;}
  el.innerHTML=matsCot.map((m,i)=>`
    <div style="display:grid;grid-template-columns:2fr 70px 90px 90px 80px 30px;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)">
      <select onchange="selMatCot(${i},this)" style="padding:7px;border:1.5px solid var(--line);border-radius:8px;font-size:12px">
        <option value="">Selecionar...</option>
        ${materiaisDisponiveis.map(mat=>`<option value="${mat.id}" data-custo="${mat.custo_compra||0}" data-venda="${mat.valor_venda||0}" ${m.material_id===mat.id?'selected':''}>${mat.nome}</option>`).join('')}
      </select>
      <input type="number" value="${m.qtd}" min="0.001" step="0.001" onchange="updMatCot(${i},'qtd',this.value)" style="padding:7px;border:1.5px solid var(--line);border-radius:8px;font-size:12px;text-align:center">
      <input type="number" value="${m.custo}" step="0.01" onchange="updMatCot(${i},'custo',this.value)" style="padding:7px;border:1.5px solid var(--line);border-radius:8px;font-size:12px">
      <input type="number" value="${m.venda}" step="0.01" onchange="updMatCot(${i},'venda',this.value)" style="padding:7px;border:1.5px solid var(--line);border-radius:8px;font-size:12px">
      <div style="font-size:12px;font-weight:700;color:var(--p);padding:4px">${Number(m.qtd*m.venda||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</div>
      <button onclick="removeMatCot(${i})" style="background:var(--red-bg);color:var(--red);border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px">×</button>
    </div>`).join('');
  calcTotaisCot();
  if(tot)tot.style.display='grid';
}

function selMatCot(i,sel){
  if(!sel.value){matsCot[i]={...matsCot[i],material_id:'',nome:'',custo:0,venda:0};renderMatCot();return;}
  const opt=sel.options[sel.selectedIndex];
  matsCot[i]={...matsCot[i],material_id:sel.value,nome:opt.text,custo:Number(opt.dataset.custo||0),venda:Number(opt.dataset.venda||0)};
  renderMatCot();
}
function updMatCot(i,campo,v){matsCot[i][campo]=Number(v)||0;calcTotaisCot();}
function calcTotaisCot(){
  const custo=matsCot.reduce((a,m)=>a+m.qtd*m.custo,0);
  const venda=matsCot.reduce((a,m)=>a+m.qtd*m.venda,0);
  const lucro=venda-custo;
  const margem=custo>0?((lucro/custo)*100).toFixed(1):0;
  const fmt=v=>Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  if(document.getElementById('cotCustoMat'))document.getElementById('cotCustoMat').textContent=fmt(custo);
  if(document.getElementById('cotLucroMat')){document.getElementById('cotLucroMat').textContent=fmt(lucro);document.getElementById('cotLucroMat').style.color=lucro>=0?'var(--green)':'var(--red)';}
  if(document.getElementById('cotMargemMat'))document.getElementById('cotMargemMat').textContent=margem+'%';
}

// Init session check for cotacao
const session = (()=>{try{const raw=sessionStorage.getItem('nuvix_v2_session');if(!raw)return null;const d=JSON.parse(raw);return{...d.user,empresa_id:d.empresa?.id}}catch{return null}})();
carregarMateriaisCot();
