<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nuvix — Portal do Técnico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#6D28D9;--p2:#4C1D95;--p3:#A78BFA;--p-light:#EDE9FE;
  --green:#059669;--green-bg:#ECFDF5;
  --red:#DC2626;--red-bg:#FEF2F2;
  --amber:#D97706;--amber-bg:#FFFBEB;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --bg:#F8F8FC;--surface:#fff;--line:#E8E8F1;
  --txt:#1F2937;--muted:#6B7280;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* ── LOGIN ── */
.login-screen{min-height:100vh;background:linear-gradient(135deg,#0D0730,#1E0A3C,#4C1D95);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:24px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 40px 80px rgba(0,0,0,.3)}
.login-logo{width:56px;height:56px;background:linear-gradient(135deg,#4C1D95,#A78BFA);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 0 28px rgba(109,40,217,.4)}
.login-logo svg{width:30px;height:22px}
.login-title{text-align:center;font-size:22px;font-weight:900;color:var(--txt);margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.login-field input{width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.login-field input:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--p-light)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4C1D95,#6D28D9);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:all .2s}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(76,29,149,.4)}
.login-err{background:var(--red-bg);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);font-weight:600;margin-top:12px;display:none;text-align:center}

/* ── PORTAL ── */
.portal{display:none;min-height:100vh;background:var(--bg)}
.portal-header{background:linear-gradient(135deg,#1E0A3C,#6D28D9);padding:20px 20px 60px;position:relative}
.portal-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.portal-logo{display:flex;align-items:center;gap:10px}
.portal-logo-ico{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center}
.portal-logo-ico svg{width:20px;height:14px}
.portal-brand{font-size:16px;font-weight:800;color:#fff}
.portal-tag{font-size:10px;color:rgba(255,255,255,.6);font-weight:600}
.portal-logout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer}
.portal-greeting{font-size:22px;font-weight:900;color:#fff;margin-bottom:2px}
.portal-date{font-size:13px;color:rgba(255,255,255,.7)}

/* ── STATS ── */
.portal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:-36px 16px 20px;position:relative;z-index:2}
.stat-card{background:#fff;border-radius:14px;padding:14px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.stat-val{font-size:24px;font-weight:900;color:var(--p)}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-top:2px}

/* ── TABS ── */
.portal-tabs{display:flex;gap:2px;background:#fff;border-bottom:1px solid var(--line);padding:8px 16px;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:10}
.portal-tabs::-webkit-scrollbar{display:none}
.portal-tab{padding:0 16px;min-height:36px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);border:none;border-radius:9px;background:transparent;white-space:nowrap;flex-shrink:0;transition:all .15s}
.portal-tab:hover{color:var(--p);background:var(--p-light)}
.portal-tab.active{color:#fff;background:var(--p)}
.portal-pane{display:none;padding:16px}.portal-pane.active{display:block}

/* ── OS CARD ── */
.os-item{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid var(--line)}
.os-item.urgente{border-left-color:var(--red)}
.os-item.alta{border-left-color:var(--amber)}
.os-item.normal{border-left-color:var(--p)}
.os-item.baixa{border-left-color:var(--muted)}
.os-num{font-size:11px;font-weight:700;color:var(--p);letter-spacing:.06em;margin-bottom:2px}
.os-cli{font-size:16px;font-weight:800;color:var(--txt);margin-bottom:2px}
.os-svc{font-size:13px;color:var(--muted);margin-bottom:10px}
.os-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.os-meta-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.os-meta-item b{color:var(--txt)}
.os-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-prim{background:var(--p);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex:1;transition:all .2s}
.btn-sec{background:var(--p-light);color:var(--p);border:1.5px solid var(--line);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex:1;transition:all .2s}
.btn-green{background:var(--green);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex:1}

/* ── STATUS BADGE ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-aberta{background:#DBEAFE;color:#1D4ED8}
.badge-agendada{background:var(--p-light);color:var(--p2)}
.badge-deslocamento{background:var(--amber-bg);color:var(--amber)}
.badge-atendimento{background:var(--green-bg);color:var(--green)}
.badge-concluida{background:var(--green-bg);color:var(--green)}
.badge-pausada{background:#F3F4F6;color:#374151}

/* ── MODAL OS DETALHE ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;overflow-y:auto;padding:16px}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:#fff;border-radius:20px;width:100%;max-width:560px;margin:auto;overflow:hidden}
.modal-hdr{background:linear-gradient(135deg,#1E0A3C,#6D28D9);color:#fff;padding:20px}
.modal-hdr-num{font-size:11px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.08em}
.modal-hdr-cli{font-size:18px;font-weight:900;margin-top:2px}
.modal-hdr-svc{font-size:13px;opacity:.7;margin-top:2px}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto}
.modal-footer{padding:16px;border-top:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--p);margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--p-light)}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-lbl{color:var(--muted);font-weight:500}
.info-val{font-weight:700;text-align:right}

/* ── CHECKLIST ── */
.check-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.check-item.done{background:var(--green-bg)}
.check-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--p);cursor:pointer;flex-shrink:0}
.check-item label{font-size:14px;font-weight:600;cursor:pointer;flex:1}
.check-item.done label{text-decoration:line-through;color:var(--muted)}

/* ── STATUS SELECTOR ── */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.status-btn{padding:12px;border-radius:12px;border:2px solid var(--line);background:#fff;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.status-btn.selected{border-color:var(--p);background:var(--p-light);color:var(--p)}
.status-btn:hover:not(.selected){border-color:var(--p3);background:var(--p-light)}

/* ── OBS FIELD ── */
.obs-field{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:12px;font-family:inherit;font-size:14px;resize:vertical;min-height:80px;outline:none;transition:border-color .2s}
.obs-field:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--p-light)}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-txt{font-size:15px;font-weight:600;margin-bottom:4px}
.empty-sub{font-size:13px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E0A3C;color:#fff;padding:12px 24px;border-radius:99px;font-size:14px;font-weight:600;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.3);transition:opacity .3s}

@media(min-width:600px){
  .portal-stats{margin:-36px 24px 20px}
  .portal-pane{padding:20px 24px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 52 36" fill="none"><path d="M34 22C33.6 20.1 31.9 18.5 29.9 18.5C28.9 18.5 28 18.9 27.35 19.55C26.55 17.8 24.8 16.5 22.75 16.5C20 16.5 17.75 18.7 17.75 21.5L17.77 21.8C16.25 22.3 15.15 23.7 15.15 25.35C15.15 27.4 16.8 29 18.85 29H34C36 29 37.65 27.35 37.65 25.35C37.65 23.35 36 21.75 34 22Z" fill="white"/></svg>
    </div>
    <div class="login-title">Portal do Técnico</div>
    <div class="login-sub">Nuvix Hub — Acesso exclusivo técnicos</div>

    </div>

      <a href="dashboard.html" style="color:var(--p);font-weight:600">← Acesso administrativo</a>
    </div>
  </div>
</div>

<!-- PORTAL -->
<div id="portalScreen" class="portal">
  <div class="portal-header">
    <div class="portal-header-top">
      <div class="portal-logo">
        <div class="portal-logo-ico">
          <svg viewBox="0 0 52 36" fill="none"><path d="M34 22C33.6 20.1 31.9 18.5 29.9 18.5C28.9 18.5 28 18.9 27.35 19.55C26.55 17.8 24.8 16.5 22.75 16.5C20 16.5 17.75 18.7 17.75 21.5L17.77 21.8C16.25 22.3 15.15 23.7 15.15 25.35C15.15 27.4 16.8 29 18.85 29H34C36 29 37.65 27.35 37.65 25.35C37.65 23.35 36 21.75 34 22Z" fill="white"/></svg>
        </div>
        <div>
          <div class="portal-brand">Nuvix Hub</div>
          <div class="portal-tag">Portal do Técnico</div>
        </div>
      </div>
      <button class="portal-logout" onclick="fazerLogout()">Sair</button>
    </div>
    <div style="margin-top:16px">
      <div class="portal-greeting" id="portalGreeting">Bom dia! </div>
      <div class="portal-date" id="portalDate"></div>
    </div>
  </div>

  <!-- STATS -->
  <div class="portal-stats">
    <div class="stat-card">
      <div class="stat-val" id="statHoje">0</div>
      <div class="stat-lbl">Hoje</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statAbertas">0</div>
      <div class="stat-lbl">Abertas</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statConcluidas" style="color:var(--green)">0</div>
      <div class="stat-lbl">Concluídas</div>

  </div>

  <!-- TABS -->
  <div class="portal-tabs">
    <button class="portal-tab active" onclick="portalTab('hoje',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Hoje</button>
    <button class="portal-tab" onclick="portalTab('minhas',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg> Minhas OS</button>

  <div id="pane-hoje" class="portal-pane active">

  </div>

    <div id="listaRelatorio"></div>

</div>

<!-- MODAL DETALHES OS -->
<div class="modal-overlay" id="modalOS">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-hdr-num" id="mOsNum">OS-000000</div>
      <div class="modal-hdr-cli" id="mOsCli">—</div>
      <div class="modal-hdr-svc" id="mOsSvc">—</div>
    </div>
    <div class="modal-body" id="mOsBody"></div>
    <div class="modal-footer">
      <button class="btn-sec" style="flex:0 0 auto;padding:10px 14px" onclick="fecharModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Fechar</button>
      <button class="btn-prim" onclick="abrirAtualizarStatus()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Atualizar status</button>
      <button class="btn-green" onclick="concluirOSTecnico()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Concluir</button>
    </div>
  </div>
</div>

<!-- MODAL ATUALIZAR STATUS -->
<div class="modal-overlay" id="modalStatus">
  <div class="modal">
    <div class="modal-hdr" style="padding:16px 20px">
      <div class="modal-hdr-num">Atualizar status</div>
      <div class="modal-hdr-cli" id="mStatusOsNum">—</div>
    </div>
    <div class="modal-body">
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px;font-weight:600">Selecione o novo status:</div>
      <div class="status-grid">
        <button class="status-btn" onclick="selecionarStatus('Agendada',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Agendada</button>
        <button class="status-btn" onclick="selecionarStatus('Em deslocamento',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> Em deslocamento</button>
        <button class="status-btn" onclick="selecionarStatus('Em atendimento',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> Em atendimento</button>
        <button class="status-btn" onclick="selecionarStatus('Aguardando material',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Aguard. material</button>

        <button class="status-btn" onclick="selecionarStatus('Concluída',this)" style="grid-column:1/-1;background:var(--green-bg);border-color:var(--green);color:var(--green)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Concluída</button>
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Observação (opcional)</div>
        <textarea class="obs-field" id="statusObs" placeholder="Descreva o que aconteceu..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-sec" onclick="fecharModalStatus()">Cancelar</button>
      <button class="btn-prim" onclick="salvarStatus()">Salvar</button>
    </div>
  </div>
</div>

<script>
const SB='https://quullcxptbiqycyakzlc.supabase.co';
const KEY='sb_publishable_hHub8WOjVFPavMPjmfGIBA_kDyvO1s6';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const db={
  get:async(t,q)=>{const r=await fetch(`${SB}/rest/v1/${t}${q||''}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json()},
  post:async(t,d)=>{const r=await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:H,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()},
  patch:async(t,id,d)=>{const r=await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()},
};

function $(id){return document.getElementById(id)}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function hoje(){return new Date().toISOString().slice(0,10)}
function fmtData(d){if(!d)return'—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function fmtHora(h){return h?String(h).slice(0,5):'—'}
function toast(txt,tipo){document.querySelector('.toast')?.remove();const t=document.createElement('div');t.className='toast';t.textContent=txt;if(tipo==='err')t.style.background='var(--red)';document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0'},2500);setTimeout(()=>t.remove(),2800)}

const TKEY='nuvix_tecnico_session';
let tSession=null;
let minhasOS=[];
let osAtual=null;
let statusSelecionado='';

// ── LOGIN ──
async function fazerLogin(){
  const email=($('loginEmail').value||'').trim().toLowerCase();
  const senha=$('loginSenha').value||'';
  if(!email||!senha){mostrarErr('Preencha e-mail e senha.');return;}
  try{
    // Try with and without ativo filter
    let users=await db.get('usuarios',`?email=eq.${encodeURIComponent(email)}&select=*`);
    if(!users.length){mostrarErr('Usuário não encontrado. Verifique o e-mail.');return;}
    const user=users[0];
    // Check password - try multiple field names
    const senhaCorreta=user.senha||user.password||user.hash_senha||'';
    if(senhaCorreta && senhaCorreta!==senha){mostrarErr('Senha incorreta.');return;}
    if(!senhaCorreta){mostrarErr('Usuário sem senha cadastrada.');return;}
    // Check if has tecnico profile or is colaborador
    const empresa=await db.get('empresas',`?id=eq.${user.empresa_id}&select=*`).then(r=>r[0]);
    tSession={...user,empresa};
    sessionStorage.setItem(TKEY,JSON.stringify(tSession));
    iniciarPortal();
  }catch(e){mostrarErr('Erro ao fazer login: '+e.message);}
}

function mostrarErr(txt){const e=$('loginErr');e.textContent=txt;e.style.display='block';setTimeout(()=>e.style.display='none',4000)}

function fazerLogout(){sessionStorage.removeItem(TKEY);tSession=null;$('loginScreen').style.display='flex';$('portalScreen').style.display='none';}

// ── INIT ──
async function init(){
  const raw=sessionStorage.getItem(TKEY);
  if(raw){try{tSession=JSON.parse(raw);iniciarPortal();return;}catch(e){}}
  $('loginScreen').style.display='flex';
  $('portalScreen').style.display='none';
}

async function iniciarPortal(){
  $('loginScreen').style.display='none';
  $('portalScreen').style.display='block';
  // Greeting
  const h=new Date().getHours();
  const nome=tSession.nome?.split(' ')[0]||'Técnico';
  const saud=h<12?'Bom dia ':h<18?'Boa tarde ':'Boa noite ';
  $('portalGreeting').textContent=saud+', '+nome+'!';
  $('portalDate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  await carregarOS();
}

// ── CARREGAR OS ──
async function carregarOS(){
  if(!tSession?.empresa_id)return;
  try{
    // Load OS assigned to this technician
    const q=`?empresa_id=eq.${tSession.empresa_id}&order=data_agendada.asc,created_at.desc`;
    let os=await db.get('ordens_servico',q);
    // Filter by tecnico_id or tecnico_nome
    const nomePartes=(tSession.nome||'').toLowerCase().split(' ');
    minhasOS=os.filter(o=>{
      if(o.tecnico_id===tSession.id)return true;
      const nTec=(o.tecnico_nome||'').toLowerCase();
      if(nomePartes.some(p=>p.length>2&&nTec.includes(p)))return true;
      return false;
    });
    // Fallback: admin ou sem OS atribuída → mostra todas
    if(!minhasOS.length){
      minhasOS=os; // mostra todas para teste/admin
    }
    renderStats();
    renderHoje();
    renderMinhas();
    renderConcluidas();
    renderRelatorio();
  }catch(e){toast('Erro ao carregar: '+e.message,'err');}
}

function renderStats(){
  const hj=hoje();
  $('statHoje').textContent=minhasOS.filter(o=>String(o.data_agendada||'').slice(0,10)===hj).length;
  $('statAbertas').textContent=minhasOS.filter(o=>!['Concluída','Cancelada'].includes(o.status||'')).length;
  $('statConcluidas').textContent=minhasOS.filter(o=>o.status==='Concluída').length;
}

  return`<div class="os-item ${prio}" onclick="abrirOS('${o.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div class="os-num">${esc(o.numero||'—')} ${atrasada?'<span style="color:var(--red)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Atrasada</span>':''}</div>
      <span class="badge ${badgeClass}">${o.status||'—'}</span>
    </div>
    <div class="os-cli">${esc(o.cliente_nome||'—')}</div>
    <div class="os-svc">${esc(o.servico||'—')}${o.equipamento?' · '+esc(o.equipamento):''}</div>
    <div class="os-meta">
      ${o.data_agendada?`<div class="os-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> <b>${fmtData(o.data_agendada)}</b>${o.hora_inicio?' às '+fmtHora(o.hora_inicio):''}</div>`:''}
      ${o.cidade?`<div class="os-meta-item"><b>${esc(o.cidade)}</b></div>`:''}
      ${o.garantia?`<div class="os-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg> <b>${esc(o.garantia)}</b></div>`:''}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-prim" onclick="event.stopPropagation();abrirOS('${o.id}')">Ver detalhes</button>
      ${!['Concluída','Cancelada'].includes(o.status||'')?`<button class="btn-sec" onclick="event.stopPropagation();abrirAtualizarStatusDireto('${o.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Status</button>`:''}
    </div>
  </div>`;
}

function renderHoje(){
  const hj=hoje();
  const lista=minhasOS.filter(o=>String(o.data_agendada||'').slice(0,10)===hj&&o.status!=='Concluída');
  $('listaHoje').innerHTML=lista.length?lista.map(osCard).join(''):`<div class="empty"><div class="empty-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div class="empty-txt">Nenhuma OS hoje</div><div class="empty-sub">Aproveite o dia! </div></div>`;
}

  const doMes=concluidas.filter(o=>String(o.data_conclusao||o.created_at||'').slice(0,7)===mes);
  const fatMes=doMes.reduce((a,o)=>a+Number(o.valor_total||0),0);
  const ticket=concluidas.length?faturamento/concluidas.length:0;

  $('listaRelatorio').innerHTML=`

      <div class="stat-card" style="text-align:left;padding:16px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Concluídas</div>
        <div style="font-size:28px;font-weight:900;color:var(--green)">${concluidas.length}</div>
        <div style="font-size:12px;color:var(--muted)">${doMes.length} este mês</div>
      </div>
      <div class="stat-card" style="text-align:left;padding:16px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Faturamento mês</div>
        <div style="font-size:22px;font-weight:900;color:var(--p)">${faturamento.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</div>
        <div style="font-size:12px;color:var(--muted)">mês atual: ${fatMes.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</div>
      </div>
      <div class="stat-card" style="text-align:left;padding:16px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Ticket médio</div>

        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)">
          <div>
            <div style="font-size:13px;font-weight:700">${esc(o.numero||'—')} — ${esc(o.cliente_nome||'—')}</div>

// ── ABRIR OS ──

  $('mOsNum').textContent=osAtual.numero||'—';
  $('mOsCli').textContent=osAtual.cliente_nome||'—';
  $('mOsSvc').textContent=(osAtual.servico||'')+(osAtual.equipamento?' · '+osAtual.equipamento:'');

  // Load checklist
  const check=await db.get('os_checklist',`?os_id=eq.${id}&order=ordem.asc`).catch(()=>[]);

  $('mOsBody').innerHTML=`

      <div class="info-row"><span class="info-lbl">Endereço</span><span class="info-val" style="max-width:200px;text-align:right">${esc(osAtual.endereco||'—')}</span></div>

      <div class="info-row"><span class="info-lbl">Equipamento</span><span class="info-val">${esc(osAtual.equipamento||'—')}</span></div>

      <div class="info-row"><span class="info-lbl">Prioridade</span><span class="info-val" style="color:${osAtual.prioridade==='Urgente'?'var(--red)':osAtual.prioridade==='Alta'?'var(--amber)':'var(--txt)'}">${osAtual.prioridade||'Normal'}</span></div>

    <div class="modal-section">
      <div class="modal-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Problema do cliente</div>
      <div style="font-size:13px;background:var(--bg);border-radius:10px;padding:12px;line-height:1.6">${esc(osAtual.problema_cliente)}</div>

    ${check.length?`

  if(concluirBtn)concluirBtn.style.display=['Concluída','Cancelada'].includes(osAtual.status||'')?'none':'block';

  $('modalOS').classList.add('open');
}

async function toggleCheckTecnico(checkId, valor, osId){
  try{
    await db.patch('os_checklist',checkId,{concluido:valor});
    await abrirOS(osId);
  }catch(e){toast('Erro ao atualizar checklist','err');}
}

async function salvarObsTecnica(osId){
  const obs=$('obsTecnicaField')?.value||'';
  try{
    await db.patch('ordens_servico',osId,{obs_tecnica:obs,updated_at:new Date().toISOString()});
    // Update local data
    const o=minhasOS.find(x=>x.id===osId);if(o)o.obs_tecnica=obs;
    toast('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Observação salva!');
  }catch(e){toast('Erro ao salvar','err');}
}

// ── STATUS ──
function abrirAtualizarStatus(){
  if(!osAtual)return;
  $('mStatusOsNum').textContent=osAtual.numero||'—';
  $('statusObs').value='';
  statusSelecionado='';
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('selected'));
  fecharModal();
  $('modalStatus').classList.add('open');
}

function abrirAtualizarStatusDireto(id){
  osAtual=minhasOS.find(x=>x.id===id);
  if(!osAtual)return;
  $('mStatusOsNum').textContent=osAtual.numero||'—';
  $('statusObs').value='';
  statusSelecionado='';
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('selected'));
  $('modalStatus').classList.add('open');
}

function selecionarStatus(status,btn){
  statusSelecionado=status;
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

async function salvarStatus(){
  if(!statusSelecionado){toast('Selecione um status.','err');return;}
  if(!osAtual)return;
  try{
    await db.patch('ordens_servico',osAtual.id,{status:statusSelecionado,updated_at:new Date().toISOString()});
    await db.post('os_timeline',{
      empresa_id:osAtual.empresa_id,
      os_id:osAtual.id,
      evento:`Status atualizado para: ${statusSelecionado}${$('statusObs').value?' — '+$('statusObs').value:''}`,
      usuario_nome:tSession?.nome||'Técnico',
      created_at:new Date().toISOString()
    });
    osAtual.status=statusSelecionado;
    toast('<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> Status atualizado!');
    fecharModalStatus();
    await carregarOS();
    if(statusSelecionado==='Concluída') await concluirOSTecnico();
  }catch(e){toast('Erro: '+e.message,'err');}
}

async function concluirOSTecnico(){
  if(!osAtual)return;
  // Trava contra duplicação: se essa OS já tem lançamento no financeiro (por qualquer
  // caminho — reabrir e concluir de novo, clique duplo, etc.), não baixa estoque nem
  // lança receita de novo.
  try{
    const jaFaturado=await db.get('financeiro',`?categoria=eq.Serviços&descricao=like.*OS ${encodeURIComponent(osAtual.numero)}*&limit=1`).catch(()=>[]);
    if(jaFaturado.length){toast('Esta OS já foi concluída e faturada anteriormente.','err');fecharModal();await carregarOS();return;}
  }catch(e){/* se a checagem falhar, segue o fluxo normal abaixo */}
  if(!confirm(`Concluir a ${osAtual.numero}?\n\nIsso irá:\n• Baixar materiais do estoque\n• Lançar receita no financeiro`))return;
  try{
    // 1. Update status
    await db.patch('ordens_servico',osAtual.id,{status:'Concluída',data_conclusao:hoje(),updated_at:new Date().toISOString()});
    // 2. Baixar materiais
    const mats=await db.get('os_materiais',`?os_id=eq.${osAtual.id}`).catch(()=>[]);
    for(const m of mats){
      if(!m.material_id)continue;
      try{
        const mat=await db.get('materiais',`?id=eq.${m.material_id}&select=estoque_atual`).then(r=>r[0]);
        if(mat){
          const novo=Math.max(0,Number(mat.estoque_atual||0)-Number(m.quantidade||0));
          await db.patch('materiais',m.material_id,{estoque_atual:novo,updated_at:new Date().toISOString()});
          await db.post('material_movimentacoes',{empresa_id:osAtual.empresa_id,material_id:m.material_id,material_nome:m.material_nome,tipo:'saida',quantidade:m.quantidade,estoque_anterior:Number(mat.estoque_atual||0),estoque_posterior:novo,custo_unitario:m.custo_unitario,valor_total:m.valor_total,motivo:'OS concluída pelo técnico',os_numero:osAtual.numero,usuario_nome:tSession?.nome||'Técnico'});
        }
      }catch(e){console.warn(e);}
    }
    // 3. Lançar financeiro
    await db.post('financeiro',{empresa_id:osAtual.empresa_id,tipo:'Receita',categoria:'Serviços',descricao:`OS ${osAtual.numero} — ${osAtual.cliente_nome} — ${osAtual.servico}`,valor:Number(osAtual.valor_total||0),data_lancamento:hoje(),vencimento:hoje(),status:'Pendente',forma_pagamento:'A combinar',favorecido:osAtual.cliente_nome||null});
    // 4. Timeline
    await db.post('os_timeline',{empresa_id:osAtual.empresa_id,os_id:osAtual.id,evento:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:-2px;display:inline-block;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg> OS concluída pelo técnico — Estoque e financeiro atualizados',usuario_nome:tSession?.nome||'Técnico',created_at:new Date().toISOString()});
    toast('OS concluída com sucesso!');
    fecharModal();
    await carregarOS();
  }catch(e){toast('Erro ao concluir: '+e.message,'err');}
}

// ── MODAIS ──
function fecharModal(){$('modalOS').classList.remove('open');}
function fecharModalStatus(){$('modalStatus').classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});});

// ── TABS ──
function portalTab(id,btn){
  document.querySelectorAll('.portal-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.portal-tab').forEach(b=>b.classList.remove('active'));
  const pane=document.getElementById('pane-'+id);if(pane)pane.classList.add('active');
  if(btn)btn.classList.add('active');
}

init();
</script>
