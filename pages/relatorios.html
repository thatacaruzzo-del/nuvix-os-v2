<script>
function $(id){return document.getElementById(id)}
function val(id){const e=$(id);return e?e.value:''}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function fmtData(d){if(!d)return'—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}
function dataLocal(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function hoje(){return dataLocal(new Date())}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function setHTML(id,h){const e=$(id);if(e)e.innerHTML=h}
function toast(t,tp){document.querySelector('.nx-toast')?.remove();const el=document.createElement('div');el.className='nx-toast '+(tp||'ok');el.textContent=t;document.body.appendChild(el);setTimeout(()=>{el.style.opacity='0'},3000);setTimeout(()=>el.remove(),3400)}
function initials(n){if(!n)return'?';return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function exportCSV(data,fn){if(!data?.length){toast('Nada para exportar.','err');return}const cols=Object.keys(data[0]);const csv=[cols.join(','),...data.map(r=>cols.map(c=>`"${String(r[c]??'').replace(/"/g,'""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=fn+'_'+hoje()+'.csv';a.click()}

const SB='https://quullcxptbiqycyakzlc.supabase.co';
const KEY='sb_publishable_hHub8WOjVFPavMPjmfGIBA_kDyvO1s6';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
function traduzErroGenerico(textoBruto){let m=String(textoBruto||'');try{const obj=JSON.parse(m);m=obj.message||obj.details||obj.hint||m;}catch(e){}if(/duplicate key|already exists/i.test(m))return'Já existe um registro com essa informação.';if(/violates not-null constraint/i.test(m))return'Preencha todos os campos obrigatórios antes de salvar.';if(/violates foreign key constraint/i.test(m))return'Não é possível concluir — esse registro está vinculado a outro cadastro.';return'Algo deu errado. Tente novamente — se continuar, entre em contato com o suporte.';}
const db={get:async(t,q)=>{let r;try{r=await fetch(`${SB}/rest/v1/${t}${q||''}`,{headers:H});}catch(e){throw new Error('Sem conexão com a internet. Verifique sua rede e tente de novo.');}if(!r.ok)throw new Error(traduzErroGenerico(await r.text()));return r.json()}};
const SESSION_KEY='nuvix_v2_session';
function getSession(){try{const raw=sessionStorage.getItem(SESSION_KEY);if(!raw)return null;const d=JSON.parse(raw);if(Date.now()-d.loginAt>8*60*60*1000){sessionStorage.removeItem(SESSION_KEY);return null}return{...d.user,empresa_id:d.empresa?.id,empresa:d.empresa}}catch{return null}}
function logout(){sessionStorage.removeItem(SESSION_KEY);window.location.href='../index.html'}
function requireAuth(){const s=getSession();if(!s){window.location.href='../index.html';return null}return s}
</script>

<script>
function abrirSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open');document.body.style.overflow='hidden'}
function fecharSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');document.body.style.overflow=''}

const session = requireAuth();
let _relDados = [];

const COLS_MODULO = {
  financeiro:['tipo','categoria','descricao','valor','data_lancamento','vencimento','data_pagamento','status','forma_pagamento','favorecido','centro_custo'],
  clientes:['nome','email','telefone','cidade','segmento','created_at'],
  colaboradores:['nome','cargo','departamento','tipo_contrato','salario','data_admissao','ativo'],
  transporte:['cliente','origem','destino','status','receita','custo_frete','data_lancamento','ppe'],
  materiais:['codigo','nome','categoria','unidade','estoque_atual','estoque_minimo','custo_compra','valor_venda','status'],
  ordens_servico:['numero','cliente_nome','servico','status','prioridade','tecnico_nome','data_abertura','data_agendada','data_conclusao','valor_total'],
  servicos_orcamentos:['servico_nome','cliente_nome','status','valor_total','data_lancamento','validade'],
  crm_oportunidades:['nome','empresa','status','valor_previsto','responsavel','created_at'],
};

const LABELS = {
  tipo:'Tipo', categoria:'Categoria', descricao:'Descrição', valor:'Valor',
  data_lancamento:'Data', vencimento:'Vencimento', data_pagamento:'Pagamento',
  status:'Status', forma_pagamento:'Forma', favorecido:'Favorecido',
  centro_custo:'Centro custo', nome:'Nome', email:'E-mail', telefone:'Telefone',
  cidade:'Cidade', segmento:'Segmento', created_at:'Criado em',
  cargo:'Cargo', departamento:'Depto', tipo_contrato:'Contrato',
  salario:'Salário', data_admissao:'Admissão', ativo:'Ativo',
  cliente:'Cliente', origem:'Origem', destino:'Destino', receita:'Receita',
  custo_frete:'Custo frete', ppe:'PPE', codigo:'Código',
  unidade:'Unidade', estoque_atual:'Estoque', estoque_minimo:'Mínimo',
  custo_compra:'Custo', valor_venda:'Venda', numero:'Número',
  cliente_nome:'Cliente', servico:'Serviço', prioridade:'Prioridade',
  tecnico_nome:'Técnico', data_abertura:'Abertura', data_agendada:'Agendado',
  data_conclusao:'Conclusão', valor_total:'Total', servico_nome:'Serviço',
  validade:'Validade', empresa:'Empresa', valor_previsto:'Valor previsto',
  responsavel:'Responsável',
};

function fmtVal(k, v){
  if(v===null||v===undefined)return'—';
  if(typeof v==='boolean')return v?'Sim':'Não';
  if(k.includes('valor')||k==='salario'||k==='receita'||k==='custo_frete')return money(v);
  if(k.includes('data')||k==='created_at'||k==='ppe'||k==='validade')return fmtData(v);
  return esc(String(v));
}

async function gerarRelatorio(){
  const modulo=val('relModulo');
  if(!modulo){toast('Selecione um módulo.','err');return;}
  let q=`?select=*&empresa_id=eq.${session.empresa_id}&order=created_at.desc&limit=500`;
  const de=val('relDe'), ate=val('relAte');
  if(de) q+=`&created_at=gte.${de}`;
  if(ate) q+=`&created_at=lte.${ate}T23:59:59`;

  setHTML('relConteudo','<div style="text-align:center;padding:32px;color:var(--muted)">Carregando...</div>');
  setHTML('relInfo','');

  try{
    _relDados = await db.get(modulo, q);
    if(!_relDados.length){
      setHTML('relConteudo','<div style="text-align:center;padding:32px;color:var(--muted)">Nenhum registro encontrado.</div>');
      return;
    }
    const cols = COLS_MODULO[modulo] || Object.keys(_relDados[0]).filter(k=>!['id','empresa_id'].includes(k));
    setHTML('relInfo',`<b>${_relDados.length}</b> registros encontrados`);
    setHTML('relConteudo',`
      <table>
        <thead><tr>${cols.map(c=>`<th>${LABELS[c]||c}</th>`).join('')}</tr></thead>
        <tbody>${_relDados.map(row=>`<tr>${cols.map(c=>`<td>${fmtVal(c,row[c])}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>`);
  }catch(e){
    toast('Erro: '+e.message,'err');
    setHTML('relConteudo','');
  }
}

function exportarRelatorio(){
  if(!_relDados.length){toast('Gere um relatório primeiro.','err');return;}
  exportCSV(_relDados, val('relModulo')||'relatorio');
}

function atualizarColunas(){
  // Just trigger visual feedback
  setHTML('relConteudo','<div style="text-align:center;padding:32px;color:var(--muted)">Clique em Gerar para carregar os dados.</div>');
}

function init(){
  if(!session)return;
  $('userName').textContent=session.nome||'';
  $('userAvatar').textContent=initials(session.nome||'');
  const emp=session.empresa;
  if(emp){
    $('topbarSub').textContent=(emp.fantasia||emp.razao||'')+' · Relatórios';
    if(emp.trial_fim){const d=Math.ceil((new Date(emp.trial_fim)-new Date())/864e5);if(d>0){$('trialBadge').textContent='Teste grátis: '+d+' dias';$('trialBadge').style.display='inline-block';}}
  }
  // Set default dates (last 30 days)
  const ate=hoje();
  const de=new Date();de.setDate(de.getDate()-30);
  if($('relDe'))$('relDe').value=dataLocal(de);
  if($('relAte'))$('relAte').value=ate;

  // Quick access cards
  setHTML('relCards',[
    {ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>',lbl:'Financeiro',mod:'financeiro',grad:'linear-gradient(150deg,#9B8CF0 0%,#8171E8 100%)'},
    {ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',lbl:'Clientes',mod:'clientes',grad:'linear-gradient(150deg,var(--p) 0%,var(--p2) 100%)'},
    {ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg>',lbl:'Ordens de Serviço',mod:'ordens_servico',grad:'linear-gradient(150deg,#5B21B6 0%,#3B1178 100%)'},
    {ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',lbl:'Materiais',mod:'materiais',grad:'linear-gradient(150deg,#C4B5FD 0%,#B4ABF9 100%)'},
  ].map(c=>`
    <div onclick="document.getElementById('relModulo').value='${c.mod}';gerarRelatorio()"
      style="background:${c.grad};border:none;border-radius:20px;padding:24px 20px;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease;text-align:center;box-shadow:0 10px 26px rgba(91,76,240,.25);color:#fff"
      onmouseover="this.style.transform='translateY(-2px)'"
      onmouseout="this.style.transform=''">
      <div style="width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;margin:0 auto 12px">${c.ico}</div>
      <div style="font-size:14px;font-weight:700;color:#fff">${c.lbl}</div>
      <div style="font-size:11px;color:rgba(255,255,255,.72);margin-top:4px">Clique para gerar</div>
    </div>`).join(''));
}

init();
</script>
<script>
// ── Sidebar dinâmica por segmento ──
(function(){
  try{
    const raw = sessionStorage.getItem('nuvix_v2_session');
    if(!raw) return;
    const d = JSON.parse(raw);
    const seg = (d.empresa?.segmento || d.empresa?.tipo || '').toLowerCase();
    const nav = document.getElementById('sidebar');
    if(!nav) return;

    const logo = nav.querySelector('.sidebar-logo');
    const configBtn = nav.querySelector('[href="parametros.html"]')?.closest('.sb-group');

    // Determine which groups to show
    const isTransporte = seg.includes('transporte');
    const isServico = seg.includes('serviço') || seg.includes('servico') || seg.includes('serviços') || seg.includes('prestação');
    const isMista = seg.includes('mista') || (!isTransporte && !isServico);

    // Hide all dynamic groups (keep logo and config)
    nav.querySelectorAll('.sb-group').forEach(g => {
      if(!g.style.marginTop) g.style.display = 'none';
    });

    // Build groups based on segment
    let html = '';

    // PRINCIPAL - always
